<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <title>Fitness Tracker</title>
  <style>
    :root { --bg: #0f0f0f; --card: #1c1c1e; --text: #fff; --sub: #8e8e93; --accent: #30d158; --blue: #0a84ff; --red: #ff453a; --orange: #ff9f0a; --border: #2c2c2e; --radius: 20px; }
    @media (prefers-color-scheme: light) { :root { --bg: #fff; --card: #f2f2f7; --text: #1c1c1e; --sub: #6e6e73; --border: #e5e5ea; } }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0 0 100px; min-height: 100vh; -webkit-tap-highlight-color: transparent; user-select: none; }
    .app { max-width: 600px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 28px; font-weight: 800; text-align: center; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; align-items: center; height: 70px; padding-bottom: env(safe-area-inset-bottom, 10px); border-top: 1px solid var(--border); z-index: 10; }
    .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--sub); cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    .nav-item.active { color: var(--blue); }
    .card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .btn { padding: 14px 20px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; background: var(--border); color: var(--text); }
    .btn-primary { background: var(--blue); color: #fff; width: 100%; justify-content: center; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--blue); }
    .btn-sm { padding: 8px 16px; font-size: 14px; }
    .btn-accent { background: var(--accent); color: #000; }
    .input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
    .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 24px; border-radius: 20px; font-weight: 600; opacity: 0; transition: 0.2s; z-index: 20; pointer-events: none; }
    .toast.show { opacity: 1; }
    .page { display: none; }
    .page.active { display: block; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 30; }
    .modal-box { background: var(--card); border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .home-tile { background: var(--card); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; }
    .meal-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .check-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); margin-right: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .check-circle.done { background: var(--accent); border-color: var(--accent); }
    .check-circle.done::after { content: '✓'; color: #000; font-weight: bold; font-size: 14px; }
    .macro-chips { display: flex; gap: 4px; margin-left: 10px; flex-wrap: wrap; align-items: center; }
    .macro-quick { background: var(--border); border: none; padding: 4px 8px; border-radius: 12px; font-size: 12px; cursor: pointer; color: var(--text); }
    .exercise-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .exercise-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .timer-big { background: var(--border); border: none; color: var(--text); padding: 8px 16px; border-radius: 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .timer-display { font-variant-numeric: tabular-nums; font-size: 20px; font-weight: 700; min-width: 60px; }
    .class-block { background: var(--bg); border-radius: 12px; padding: 12px; margin: 8px 0; }
    .intensity-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin: 6px 0; }
    .intensity-fill { height: 100%; border-radius: 4px; background: var(--orange); transition: width 0.3s; }
    .macro-live { margin-left: 34px; margin-top: 4px; font-size: 13px; color: var(--sub); }
    .chat-message { padding: 8px; border-radius: 12px; margin: 4px 0; max-width: 90%; }
    .chat-user { background: var(--blue); color: #fff; align-self: flex-end; text-align: right; }
    .chat-ai { background: var(--border); align-self: flex-start; }
    .day-weight, .water-input { width: 70px; }
  </style>
</head>
<body>
<div class="app">
  <div class="toast" id="toast"></div>

  <!-- Home Page -->
  <div id="homePage" class="page active">
    <h1>🏠 Dashboard</h1>
    <div class="card" id="overviewCard"></div>
    <div class="card">
      <h3>📈 Body Composition & Home Scale</h3>
      <canvas id="homeChart" height="200"></canvas>
    </div>
    <div class="home-grid">
      <div class="home-tile" id="tileImportPlan">📋<br>Import Plan</div>
      <div class="home-tile" id="tileLoadChat">💬<br>Load Chat</div>
      <input type="file" accept=".txt" id="chatHistoryFileInputHome" style="display:none;">
      <div class="home-tile" id="tileCoach">🧠<br>Coach</div>
      <div class="home-tile" id="tileSettings">⚙️<br>Settings</div>
    </div>
  </div>

  <!-- Input Page -->
  <div id="inputPage" class="page">
    <button class="btn btn-outline btn-sm" id="backToHomeFromInput">← Home</button>
    <div style="display:flex; gap:2px; background:var(--card); border-radius:12px; padding:4px; margin:16px 0;">
      <button class="btn tab-btn active" id="pasteTabBtn">📋 Paste</button>
      <button class="btn tab-btn" id="linkTabBtn">🔗 Link</button>
    </div>
    <div class="card">
      <div id="pasteDiv"><textarea class="input" id="planText" rows="8" placeholder="Paste your plan"></textarea><button class="btn btn-primary" id="parsePasteBtn">✨ Parse & Load</button></div>
      <div id="linkDiv" style="display:none;"><input class="input" id="docLink" placeholder="Google Doc link"><button class="btn btn-primary" id="fetchLinkBtn">🔍 Fetch & Parse</button></div>
    </div>
  </div>

  <!-- Tracker Page -->
  <div id="trackerPage" class="page">
    <div id="weekProgressCard" class="card"></div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
      <button class="btn btn-outline btn-sm" id="exportPdfBtn">📄 PDF</button>
      <button class="btn btn-outline btn-sm" id="copyClipBtn">📋 Copy</button>
      <button class="btn btn-outline btn-sm" id="toggleExpandBtn">📅 Expand/Collapse</button>
      <button class="btn btn-outline btn-sm" id="goToTodayBtn">📍 Today</button>
      <button class="btn btn-outline btn-sm" id="newWeekBtn">🗑 New Week</button>
    </div>
    <div id="daysContainer"></div>
  </div>

  <!-- Coach Page -->
  <div id="coachPage" class="page">
    <div class="card">
      <h3>🧠 AI Coach</h3>
      <div id="chatMessages" style="height:250px; background:var(--bg); border-radius:12px; margin:10px 0; overflow-y:auto; padding:10px; display:flex; flex-direction:column;"></div>
      <div style="display:flex; gap:6px;">
        <input class="input" id="chatInput" placeholder="Ask anything...">
        <button class="btn btn-primary" style="width:auto;" id="sendChatBtn">📨</button>
      </div>
      <div style="display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" id="aiReportBtn">📊 Report</button>
        <button class="btn btn-outline btn-sm" id="shoppingListBtn">🛒 Grocery</button>
        <button class="btn btn-accent btn-sm" id="aiProgressionBtn">🤖 Next Week</button>
      </div>
    </div>
  </div>

  <!-- History Page -->
  <div id="historyPage" class="page">
    <div class="card">
      <h3>📚 Past Weeks</h3>
      <div id="historyList"></div>
      <hr style="border-color:var(--border); margin:16px 0;">
      <h4>🗂 Templates</h4>
      <div id="templateList"></div>
      <button class="btn btn-outline btn-sm" id="saveTemplateBtn">💾 Save Current</button>
    </div>
  </div>

  <!-- Settings Page -->
  <div id="settingsPage" class="page">
    <div class="card">
      <h3>⚙️ Settings</h3>
      <label>AI Mode <select class="input" id="aiModeSelect"><option value="web">Web (Free)</option><option value="api">API Key</option></select></label>
      <div id="apiKeySection" style="display:block;">
        <label>DeepSeek API Key <input class="input" type="password" id="apiKeyInput"></label>
        <button class="btn btn-primary btn-sm" id="saveApiKeyBtn">Save</button>
      </div>
      <hr style="border-color:var(--border); margin:16px 0;">
      <h4>📸 Body Scans</h4>
      <div id="scansContainer"></div>
      <input type="file" accept="image/*" multiple id="scanFileInput" style="display:none;">
      <button class="btn btn-outline btn-sm" id="addScanBtn">➕ Add Scans</button>
      <button class="btn btn-outline btn-sm" id="analyzeLastScanBtn">🔬 Analyze Latest</button>
      <hr style="border-color:var(--border); margin:16px 0;">
      <button class="btn btn-outline" id="helpBtn">❓ Help</button>
      <button class="btn btn-outline" id="darkModeBtn">🌓 Theme</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="home" id="navHome">🏠 Home</div>
  <div class="nav-item" data-page="tracker" id="navTracker">📋 Tracker</div>
  <div class="nav-item" data-page="coach" id="navCoach">🧠 Coach</div>
  <div class="nav-item" data-page="history" id="navHistory">📚 History</div>
  <div class="nav-item" data-page="settings" id="navSettings">⚙️ Settings</div>
</div>

<!-- Modals -->
<div id="newWeekModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>New Week</h3>
    <button class="btn btn-primary" id="newWeekPasteBtn">📋 Paste text</button>
    <button class="btn btn-outline" id="newWeekLinkBtn">🔗 Google Doc link</button>
    <button class="btn btn-outline" id="autoGenBtn">🤖 Auto (+5 lbs)</button>
    <button class="btn btn-accent" id="aiProgModalBtn">🧠 AI Smart Progression</button>
    <button class="btn btn-outline" id="cancelNewWeekBtn">Cancel</button>
  </div>
</div>
<div id="helpModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div id="helpSlides"></div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn btn-outline" id="helpSkipBtn">Close</button>
      <button class="btn btn-primary" id="helpNextBtn">Next →</button>
    </div>
  </div>
</div>
<div id="scanDataModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>Scan Analysis</h3>
    <div id="scanDataContent" style="margin-bottom:12px; white-space:pre-wrap; font-size:14px; max-height:150px; overflow-y:auto;"></div>
    <label>Date of Scan</label>
    <input type="date" class="input" id="scanDateInput">
    <label>Weight (lbs)</label>
    <input type="number" class="input" id="scanWeightInput" step="0.1">
    <label>Skeletal Muscle Mass (lbs)</label>
    <input type="number" class="input" id="scanMuscleInput" step="0.1">
    <label>Body Fat %</label>
    <input type="number" class="input" id="scanFatInput" step="0.1">
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn btn-primary" id="saveScanDataBtn">Save</button>
      <button class="btn btn-outline" id="cancelScanDataBtn">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(function() {
  // ---------- STATE ----------
  const daysOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  let weekHistory = [], currentWeekIndex = -1, allExpanded = true, darkMode = true,
      deepseekKey = localStorage.getItem('deepseekKey') || '', chatHistory = localStorage.getItem('deepseekChatHistory') || '',
      templates = JSON.parse(localStorage.getItem('templates') || '[]'), aiMode = localStorage.getItem('aiMode') || 'web',
      db, currentChart, activeTimers = {}, tesseractWorker, helpSlide = 0, currentScanId;

  const helpSlidesData = [
    {title:'Welcome!',text:'Your AI-powered fitness tracker. Log workouts, meals, and chat with DeepSeek directly.'},
    {title:'Home',text:'Dashboard with body composition trends from scans and home scale.'},
    {title:'Tracker',text:'Check off meals, fill macros, log sets/weight/reps/RPE. Timers for circuits and classes.'},
    {title:'Coach',text:'Integrated DeepSeek AI – ask questions, get reports, generate plans.'},
    {title:'Settings',text:'Enter DeepSeek API key, manage body scans, and import chat history.'}
  ];

  const toast = msg => {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2000);
  };

  // ---------- INDEXEDDB ----------
  const openDB = () => new Promise((res,rej) => {
    const req = indexedDB.open('BodyScansDB', 1);
    req.onerror = rej; req.onsuccess = () => { db = req.result; res(); };
    req.onupgradeneeded = () => req.result.createObjectStore('scans', { keyPath:'id', autoIncrement:true });
  });
  const addScan = async (img, date) => { await openDB(); return new Promise(res => { const tx = db.transaction('scans','readwrite'); tx.objectStore('scans').add({ image:img, uploadDate:date, scanDate:'', weight:null, muscleMass:null, bodyFat:null }); tx.oncomplete = res; }); };
  const getScans = async () => { await openDB(); return new Promise(res => { const tx = db.transaction('scans','readonly'); tx.objectStore('scans').getAll().onsuccess = e => res(e.target.result); }); };
  const updateScan = async (id, data) => { await openDB(); return new Promise(res => { const tx = db.transaction('scans','readwrite'); const store = tx.objectStore('scans'); const req = store.get(id); req.onsuccess = () => { const s = req.result; Object.assign(s, data); store.put(s); tx.oncomplete = res; }; }); };
  const deleteScan = async id => { await openDB(); return new Promise(res => { const tx = db.transaction('scans','readwrite'); tx.objectStore('scans').delete(id); tx.oncomplete = res; }); };

  // ---------- STORAGE ----------
  const saveHistory = () => { localStorage.setItem('weekHistory', JSON.stringify(weekHistory)); localStorage.setItem('currentWeekIndex', currentWeekIndex); };
  const loadHistory = () => {
    const h = localStorage.getItem('weekHistory');
    if (h) {
      weekHistory = JSON.parse(h); currentWeekIndex = parseInt(localStorage.getItem('currentWeekIndex')) || weekHistory.length-1;
      if (currentWeekIndex<0 || currentWeekIndex>=weekHistory.length) currentWeekIndex = weekHistory.length-1;
    } else { weekHistory = []; currentWeekIndex = -1; }
    saveHistory();
  };
  const getCurrentWeek = () => (weekHistory.length && currentWeekIndex>=0) ? weekHistory[currentWeekIndex] : null;
  const getCurrentPlan = () => { const w = getCurrentWeek(); return w ? w.plan : null; };
  const saveCurrentWeek = () => { if (getCurrentWeek()) { weekHistory[currentWeekIndex] = getCurrentWeek(); saveHistory(); } };

  // ---------- PARSER ----------
  const parsePlan = text => {
    const mealSec = text.match(/SECTION\s*1\s*:?\s*MEAL\s*PLAN/i);
    const workSec = text.match(/SECTION\s*2\s*:?\s*(WEEKLY\s*)?WORKOUT\s*SCHEDULE/i);
    if (mealSec && workSec) return parseStructured(text, mealSec.index, workSec.index);
    else return parseFreeform(text);
  };

  const buildDays = dayMap => ({ days: daysOrder.map(d => ({ ...dayMap[d], notes:'' })).filter(d => d.meals.length || d.workoutBlocks.length) });

  const parseStructured = (text, mealStart, workStart) => {
    const dayMap = {}; daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const mealText = text.substring(mealStart, workStart), workoutText = text.substring(workStart);
    let curMealDay = null;
    mealText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) { curMealDay = dayMatch; return; }
      if (curMealDay && /^[·•\-*]\s/.test(line)) {
        let content = line.replace(/^[·•\-*]\s*/, '').trim();
        const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
        let time='', desc=content;
        if (timeMatch) { time=timeMatch[1].trim(); desc=timeMatch[2].trim(); }
        desc = desc.replace(/\s*~\s*\d+.*$/,'').trim();
        if (desc) dayMap[curMealDay].meals.push({ id: crypto.randomUUID(), name:desc, time, completed:false, ateNotes:'', protein:'', carbs:'', fat:'' });
      }
    });
    let curWorkDay = null, curBlock = null;
    workoutText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) {
        if (curBlock && (curBlock.exercises?.length || curBlock.type==='class')) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        curWorkDay = dayMatch; curBlock = null; return;
      }
      if (!curWorkDay) return;
      const classMatch = line.match(/^·\s*Class\s*:\s*(.*)/i);
      if (classMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        const times = classMatch[1].match(/(\d{1,2}:\d{2}\s*[APMapm]*)\s*[-–—]\s*(\d{1,2}:\d{2}\s*[APMapm]*)/);
        let duration = '';
        if (times) { const s = new Date(`2025-01-01 ${times[1]}`), e = new Date(`2025-01-01 ${times[2]}`); const mins = (e-s)/60000; if (mins>0) duration = String(mins); }
        curBlock = { type:'class', name:'Judo / Class', duration, intensity:50, notes:'' };
        return;
      }
      if (curBlock && curBlock.type==='class') {
        if (/^·\s*Intensity/i.test(line)) { const p = line.match(/(\d+)/); if (p) curBlock.intensity = parseInt(p[1]); }
        return;
      }
      const partMatch = line.match(/^Part\s*(\d+)\s*:\s*(.*)/i), circuitMatch = line.match(/^Format\s*:\s*(.*)/i);
      if (partMatch || circuitMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        const name = partMatch ? `Part ${partMatch[1]}: ${partMatch[2]}` : circuitMatch[1];
        const isCircuit = !!circuitMatch;
        let time = '';
        if (circuitMatch) { const t = circuitMatch[1].match(/(\d+)\s*-\s*min/); if (t) time = t[1]+' min'; }
        curBlock = { name, time, exercises:[], isCircuit, type:'workout' };
        return;
      }
      if (!curBlock) curBlock = { name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' };
      if (/^(Post-Workout|Pre-Class|Pre-Workout|Post-Class|Step\s+Exercise)/i.test(line)) return;
      if (/Exercise\s+Sets\s+Reps/i.test(line) || /^Actual/i.test(line) || /^Weights Used/i.test(line)) return;
      addExerciseToBlock(curBlock, line);
    });
    if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
    return buildDays(dayMap);
  };

  const parseFreeform = text => {
    const dayMap = {}; daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const lines = text.split('\n'); let currentDay = null, afterWorkout = false;
    for (let line of lines) {
      line = line.trim(); if (!line) continue;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z0-9]/.test(line[d.length]));
      if (dayMatch) { currentDay = dayMatch; afterWorkout = false; continue; }
      if (!currentDay) continue;
      if (/workout|training|circuit|class|density block/i.test(line)) { afterWorkout = true; continue; }
      if (/^[·•\-*]\s/.test(line)) {
        let content = line.replace(/^[·•\-*]\s*/, '').trim();
        if (afterWorkout) addExerciseToDay(dayMap[currentDay], content);
        else {
          const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
          if (timeMatch) {
            let time = timeMatch[1].trim(), desc = timeMatch[2].trim().replace(/\s*~\s*\d+.*$/,'').trim();
            if (desc) dayMap[currentDay].meals.push({ id:crypto.randomUUID(), name:desc, time, completed:false, ateNotes:'', protein:'', carbs:'', fat:'' });
          } else {
            if (/\d+\s*x\s*\d+/.test(content) || /\d+\s*(sec|min|yds|lbs?)/.test(content)) addExerciseToDay(dayMap[currentDay], content);
            else dayMap[currentDay].meals.push({ id:crypto.randomUUID(), name:content, time:'', completed:false, ateNotes:'', protein:'', carbs:'', fat:'' });
          }
        }
      }
    }
    return buildDays(dayMap);
  };

  const addExerciseToDay = (day, line) => {
    if (!day.workoutBlocks.length || day.workoutBlocks[day.workoutBlocks.length-1].type !== 'workout')
      day.workoutBlocks.push({ name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' });
    addExerciseToBlock(day.workoutBlocks[day.workoutBlocks.length-1], line);
  };

  const addExerciseToBlock = (block, line) => {
    let exName=null, prescribed='', workSec=0, restSec=0, prescribedWeight='', sets='';
    const stationMatch = line.match(/^(.+?)\s+(\d+)\s*sec\s+(\d+)\s*sec/i);
    if (stationMatch && block.isCircuit) {
      exName = stationMatch[1].trim(); workSec = +stationMatch[2]; restSec = +stationMatch[3]; prescribed = `${workSec}s/${restSec}s`;
      const wM = line.match(/(\d+)\s*lbs?/i); if (wM) prescribedWeight = wM[1]+' lbs';
    } else {
      let m = line.match(/^\d+\s+(.*?)\s+(\d+)\s*(?:min|sec)\s+(\d+-?\d*)/i);
      if (m) { exName = m[1].trim(); workSec = +m[2]*60; prescribed = m[3]; const wM = line.match(/(\d+)\s*lb/i); if (wM) prescribedWeight = wM[1]+' lbs'; }
      else {
        m = line.match(/^([A-Z]):\s*(.*?)(?:\s+(\d+)\s+(\d+[\/\w]*))?\s+(\d+\s*sec)?/);
        if (m) { exName = m[2].trim(); if (m[3] && m[4]) { sets = m[3]; prescribed = `${sets}x${m[4]}`; } if (m[5]) workSec = +m[5]; const wM = line.match(/(\d+)\s*lb\b/i); if (wM) prescribedWeight = wM[1]+' lbs'; }
        else { const generic = line.match(/^(.+?)\s+(\d+)\s*x\s*(\d+)/i); if (generic) { exName = generic[1].trim(); sets = generic[2]; prescribed = `${sets}x${generic[3]}`; } else exName = line.split(/\s+/).slice(0,4).join(' '); }
      }
    }
    if (exName && exName.length>2) block.exercises.push({ id:crypto.randomUUID(), name:exName.charAt(0).toUpperCase()+exName.slice(1), prescribedSetsReps:prescribed, prescribedWeight, completed:false, sets:'', weight:'', reps:'', rpe:'5', workSec, restSec });
  };

  // ---------- HELPERS ----------
  const calcProgress = plan => { let t=0,d=0; plan.days.forEach(day => { day.meals.forEach(m => { t++; if(m.completed)d++; }); (day.workoutBlocks||[]).forEach(b => { if(b.type!=='class') b.exercises.forEach(e => { t++; if(e.completed)d++; }); }); }); return t ? Math.round(d/t*100) : 0; };
  const exerciseCount = day => { let t=0; (day.workoutBlocks||[]).forEach(b => { if(b.type==='workout') t += b.exercises.length; else if(b.type==='class') t++; }); return t; };
  const calcDayMacros = day => { const p = (day.meals||[]).reduce((s,m)=>s+(+m.protein||0),0), c = (day.meals||[]).reduce((s,m)=>s+(+m.carbs||0),0), f = (day.meals||[]).reduce((s,m)=>s+(+m.fat||0),0); return { protein:p.toFixed(0), carbs:c.toFixed(0), fat:f.toFixed(0), cal:(p*4+c*4+f*9).toFixed(0) }; };
  const rpeColor = val => val<=3 ? 'var(--accent)' : val<=6 ? 'var(--orange)' : 'var(--red)';
  const formatSeconds = sec => { const m=Math.floor(sec/60), s=sec%60; return `${m}:${s.toString().padStart(2,'0')}`; };
  const formatMinutes = mins => formatSeconds(parseInt(mins)*60);
  const parseTimeToSecs = str => { const mins = str.match(/(\d+)\s*min/); return mins ? +mins[1]*60 : 0; };

  // ---------- TRACKER RENDER ----------
  const renderTracker = () => {
    const plan = getCurrentPlan(); if (!plan) return;
    document.getElementById('weekProgressCard').innerHTML = `<h3>Progress: ${calcProgress(plan)}%</h3><div class="progress-bar"><div class="progress-fill" style="width:${calcProgress(plan)}%;"></div></div>`;
    const container = document.getElementById('daysContainer'); container.innerHTML = '';
    plan.days.forEach((day, di) => {
      const card = document.createElement('div'); card.className = 'card day-card';
      card.innerHTML = buildDayHTML(day, di);
      container.appendChild(card);
      card.querySelector('.day-weight').onchange = e => updateDailyWeight(di, e.target.value);
      card.querySelector('.water-input').onchange = e => updateWater(di, e.target.value);
      card.querySelectorAll('.macro-input').forEach(inp => inp.oninput = () => updateMacroLive(di));
      card.querySelectorAll('.exercise-input').forEach(inp => inp.onchange = () => saveCurrentWeek());
    });
    updateAllMacroLive();
  };

  const buildDayHTML = (day, di) => {
    const macros = calcDayMacros(day);
    return `<div class="day-header" style="display:flex; justify-content:space-between; cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">
      <b>${day.day}</b>
      <span>${day.meals.filter(m=>m.completed).length}/${day.meals.length} meals · ${exerciseCount(day)} ex</span>
      <input class="input day-weight" type="number" value="${day.dailyWeight||''}" placeholder="lbs" style="width:70px;">
      <input class="input water-input" type="number" value="${day.waterOz||''}" placeholder="oz" style="width:60px;">
    </div>
    <div class="day-body" style="display:${allExpanded?'block':'none'};">
      ${renderMeals(day, di)}
      ${renderWorkouts(day, di)}
      <textarea class="input day-notes" placeholder="Day notes" style="height:40px;" onchange="updateDayNotes(${di}, this.value)">${day.notes||''}</textarea>
    </div>`;
  };

  const renderMeals = (day, di) => {
    if (!day.meals.length) return '';
    const macros = calcDayMacros(day);
    let html = `<div class="section-title" style="font-weight:700; color:var(--blue); margin-top:10px;">🥗 Meals</div>`;
    day.meals.forEach((m, mi) => {
      html += `
        <div class="meal-row">
          <div class="check-circle ${m.completed?'done':''}" onclick="event.stopPropagation(); toggleMeal(${di},${mi})"></div>
          <span>${m.name} ${m.time ? `<small style="color:var(--sub);">${m.time}</small>` : ''}</span>
          <div class="macro-chips">
            <input class="input macro-input" type="number" placeholder="P" value="${m.protein||''}" data-day="${di}" data-index="${mi}" data-field="protein" style="width:45px; padding:4px;">
            <input class="input macro-input" type="number" placeholder="C" value="${m.carbs||''}" data-day="${di}" data-index="${mi}" data-field="carbs" style="width:45px; padding:4px;">
            <input class="input macro-input" type="number" placeholder="F" value="${m.fat||''}" data-day="${di}" data-index="${mi}" data-field="fat" style="width:45px; padding:4px;">
            <button class="macro-quick" onclick="event.stopPropagation(); macroQuickAdd(${di},${mi},'protein',10)">+10P</button>
            <button class="macro-quick" onclick="macroQuickAdd(${di},${mi},'carbs',25)">+25C</button>
            <button class="macro-quick" onclick="macroQuickAdd(${di},${mi},'fat',10)">+10F</button>
          </div>
        </div>
        <textarea class="input ate-notes" placeholder="What I ate" data-day="${di}" data-index="${mi}" data-field="ateNotes" style="margin-left:34px; width:calc(100% - 34px);" onchange="saveCurrentWeek()">${m.ateNotes||''}</textarea>`;
    });
    html += `<div class="macro-live" id="macroLive${di}">🔥 ${macros.cal} kcal | 🥩 ${macros.protein}g | 🌾 ${macros.carbs}g | 🥑 ${macros.fat}g</div>`;
    return html;
  };

  const renderWorkouts = (day, di) => {
    if (!day.workoutBlocks.length) return '';
    let html = `<div class="section-title" style="font-weight:700; color:var(--blue); margin-top:10px;">🏋️ Workout</div>`;
    day.workoutBlocks.forEach((block, bi) => {
      if (block.type === 'class') {
        html += `
          <div class="class-block">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <b>🥋 ${block.name}</b>
              <div style="display:flex; gap:4px; align-items:center;">
                <span class="timer-display" id="classTimer-${di}-${bi}">${block.duration ? formatMinutes(parseInt(block.duration)) : '--:--'}</span>
                <button class="timer-big" id="classStart-${di}-${bi}" onclick="startClassTimer(${di},${bi})">▶ Start</button>
              </div>
            </div>
            <div style="margin-top:8px;">
              <label>Intensity: <span id="classIntensityLabel-${di}-${bi}">${block.intensity}%</span></label>
              <input type="range" min="0" max="100" value="${block.intensity}" oninput="updateClassIntensity(${di},${bi}, this.value)">
              <div class="intensity-bar"><div class="intensity-fill" id="classIntensityBar-${di}-${bi}" style="width:${block.intensity}%;"></div></div>
            </div>
            <textarea class="input" placeholder="Class notes" style="height:40px;" onchange="saveCurrentWeek()">${block.notes||''}</textarea>
          </div>`;
      } else {
        html += `<div style="background:var(--bg); border-radius:12px; padding:12px; margin:8px 0;">
          <div style="display:flex; justify-content:space-between;"><b>${block.name}</b><span>${block.time||''}</span></div>`;
        block.exercises.forEach((ex, ei) => {
          html += `
            <div class="exercise-row">
              <div class="exercise-header">
                <div class="check-circle ${ex.completed?'done':''}" onclick="event.stopPropagation(); toggleExercise(${di},${bi},${ei})"></div>
                <span>${ex.name} <small>${ex.prescribedSetsReps || ''}</small> ${ex.prescribedWeight ? `<small style="color:var(--orange)">${ex.prescribedWeight}</small>` : ''}</span>
                ${ex.workSec && !block.isCircuit ? `<span class="timer-display" id="exTimer-${ex.id}">${formatSeconds(ex.workSec)}</span><button class="timer-big" id="exStart-${ex.id}" onclick="startExTimer('${ex.id}', this)">▶</button>` : ''}
                ${block.isCircuit ? `<span class="timer-display" id="circuitExTimer-${di}-${bi}-${ei}">${ex.workSec}s</span>` : ''}
              </div>
              <div style="display:flex; gap:4px; margin-left:34px; margin-top:4px;">
                <input class="input exercise-input" type="number" placeholder="Sets" value="${ex.sets||''}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="sets" style="width:60px;">
                <input class="input exercise-input" type="text" placeholder="Weight" value="${ex.weight}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="weight" style="width:70px;">
                <input class="input exercise-input" type="text" placeholder="Reps" value="${ex.reps}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="reps" style="width:60px;">
                <input class="input exercise-input" type="number" min="1" max="10" value="${ex.rpe||'5'}" data-field="rpe" data-day="${di}" data-block="${bi}" data-index="${ei}" style="width:50px; color:${rpeColor(ex.rpe||5)};">
              </div>
            </div>`;
        });
        if (block.isCircuit) {
          html += `<div style="display:flex; justify-content:center; margin-top:8px; gap:10px;">
            <button class="timer-big" id="circuitStart-${di}-${bi}" onclick="startCircuitTimer(${di},${bi}, this)">▶ Start Circuit</button>
            <span class="timer-display" id="circuitOverall-${di}-${bi}">${block.time ? formatMinutes(parseTimeToSecs(block.time)) : '--:--'}</span>
          </div>`;
        }
        html += `</div>`;
      }
    });
    return html;
  };

  // ---------- STATE UPDATES ----------
  const toggleMeal = (di, mi) => { const w = getCurrentWeek(); w.plan.days[di].meals[mi].completed = !w.plan.days[di].meals[mi].completed; saveCurrentWeek(); renderTracker(); };
  const toggleExercise = (di, bi, ei) => { const w = getCurrentWeek(); w.plan.days[di].workoutBlocks[bi].exercises[ei].completed = !w.plan.days[di].workoutBlocks[bi].exercises[ei].completed; saveCurrentWeek(); renderTracker(); };
  const updateDailyWeight = (di, val) => { const w=getCurrentWeek(); if(w){ w.plan.days[di].dailyWeight = val ? +val : null; saveCurrentWeek(); renderHome(); } };
  const updateWater = (di, val) => { const w=getCurrentWeek(); if(w){ w.plan.days[di].waterOz = val; saveCurrentWeek(); } };
  const updateDayNotes = (di, val) => { const w=getCurrentWeek(); if(w){ w.plan.days[di].notes = val; saveCurrentWeek(); } };
  const updateClassIntensity = (di, bi, val) => {
    const w = getCurrentWeek(); if(w) w.plan.days[di].workoutBlocks[bi].intensity = +val;
    document.getElementById(`classIntensityLabel-${di}-${bi}`).textContent = val + '%';
    document.getElementById(`classIntensityBar-${di}-${bi}`).style.width = val + '%';
    saveCurrentWeek();
  };
  const macroQuickAdd = (di, mi, field, amount) => {
    const w = getCurrentWeek(); const meal = w.plan.days[di].meals[mi];
    const cur = parseFloat(meal[field]) || 0; meal[field] = (cur + amount).toFixed(0);
    saveCurrentWeek(); updateMacroLive(di);
  };
  const updateMacroLive = di => {
    const day = getCurrentPlan().days[di]; const macros = calcDayMacros(day);
    const el = document.getElementById(`macroLive${di}`);
    if (el) el.innerHTML = `🔥 ${macros.cal} kcal | 🥩 ${macros.protein}g | 🌾 ${macros.carbs}g | 🥑 ${macros.fat}g`;
  };
  const updateAllMacroLive = () => { const p=getCurrentPlan(); if(p) p.days.forEach((_,i) => updateMacroLive(i)); };

  // ---------- TIMERS ----------
  const startClassTimer = (di, bi) => {
    const block = getCurrentPlan().days[di].workoutBlocks[bi]; const duration = parseInt(block.duration); if (!duration) return;
    const key = `class-${di}-${bi}`; const btn = document.getElementById(`classStart-${di}-${bi}`);
    if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; return; }
    let remaining = duration * 60; const display = document.getElementById(`classTimer-${di}-${bi}`);
    btn.innerHTML = '⏸ Pause';
    activeTimers[key] = { id: setInterval(() => {
      remaining--; display.textContent = formatSeconds(remaining);
      if (remaining <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; playBeep(800,0.3); }
    }, 1000) };
  };
  const startExTimer = (exId, btn) => {
    const exercise = findExercise(exId); if (!exercise || !exercise.workSec) return;
    const key = `ex-${exId}`; if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶'; return; }
    let remaining = exercise.workSec; const display = document.getElementById(`exTimer-${exId}`);
    btn.innerHTML = '⏸';
    activeTimers[key] = { id: setInterval(() => {
      remaining--; if (display) display.textContent = formatSeconds(remaining);
      if (remaining <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶'; playBeep(800,0.15); }
    }, 1000) };
  };
  const findExercise = id => { for (let d of getCurrentPlan().days) for (let b of d.workoutBlocks) for (let e of b.exercises) if(e.id===id) return e; };
  const startCircuitTimer = (di, bi, btn) => {
    const block = getCurrentPlan().days[di].workoutBlocks[bi]; const key = `circuit-${di}-${bi}`;
    if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; return; }
    let total = parseTimeToSecs(block.time) || 99999, station=0, inWork=true, left=block.exercises[0].workSec;
    btn.innerHTML = '⏸ Pause';
    activeTimers[key] = { id: setInterval(() => {
      total--; left--;
      document.getElementById(`circuitOverall-${di}-${bi}`).textContent = formatSeconds(total);
      const exDisp = document.getElementById(`circuitExTimer-${di}-${bi}-${station}`);
      if (exDisp) exDisp.textContent = inWork ? `Work ${formatSeconds(left)}` : `Rest ${formatSeconds(left)}`;
      if (left <= 0) {
        if (inWork) { inWork = false; left = block.exercises[station].restSec || 0; }
        else { inWork = true; station = (station+1)%block.exercises.length; left = block.exercises[station].workSec; }
      }
      if (total <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; playBeep(800,0.3); }
    }, 1000) };
  };
  const playBeep = (f=800,d=0.15) => { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(),g=ctx.createGain(); o.type='square'; o.frequency.value=f; g.gain.value=0.3; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+d); };

  const toggleAllDays = () => { allExpanded = !allExpanded; renderTracker(); };
  const goToToday = () => {
    const todayIdx = (new Date().getDay() + 6) % 7; const today = daysOrder[todayIdx];
    const headers = document.querySelectorAll('.day-header b');
    for (let h of headers) if (h.textContent === today) { h.closest('.card').scrollIntoView({behavior:'smooth'}); break; }
  };

  // ---------- NAVIGATION ----------
  const navigateTo = page => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'Page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (nav) nav.classList.add('active');
    if (page === 'home') renderHome();
    else if (page === 'tracker') renderTracker();
    else if (page === 'history') renderHistory();
    else if (page === 'settings') renderSettings();
  };

  // ---------- HOME & CHART ----------
  const renderHome = () => {
    const week = getCurrentWeek();
    document.getElementById('overviewCard').innerHTML = week ? `<h3>Current Week</h3><div>Started: ${new Date(week.startDate).toLocaleDateString()}</div><div>Progress: ${calcProgress(week.plan)}%</div>` : '<h3>No data loaded</h3><p>Import your first plan!</p>';
    drawWeightChart();
  };

  const drawWeightChart = () => {
    const ctx = document.getElementById('homeChart').getContext('2d');
    const dailyPoints = [];
    weekHistory.forEach(w => {
      const base = new Date(w.startDate);
      w.plan.days.forEach((d, i) => { if (d.dailyWeight) { const date = new Date(base); date.setDate(date.getDate()+i); dailyPoints.push({ x: date.toISOString().split('T')[0], y: d.dailyWeight }); } });
    });
    getScans().then(scans => {
      const scanData = scans.filter(s => s.scanDate && (s.weight!=null || s.muscleMass!=null || s.bodyFat!=null)).sort((a,b) => new Date(a.scanDate)-new Date(b.scanDate));
      const labelsSet = new Set();
      dailyPoints.forEach(p => labelsSet.add(p.x));
      scanData.forEach(s => labelsSet.add(s.scanDate));
      const labels = Array.from(labelsSet).sort();
      const homeWeights = labels.map(l => { const dp = dailyPoints.find(p => p.x===l); return dp ? dp.y : null; });
      const scanWeights = labels.map(l => { const s = scanData.find(s => s.scanDate===l); return s && s.weight!=null ? s.weight : null; });
      const muscles = labels.map(l => { const s = scanData.find(s => s.scanDate===l); return s && s.muscleMass!=null ? s.muscleMass : null; });
      const fats = labels.map(l => { const s = scanData.find(s => s.scanDate===l); return s && s.bodyFat!=null ? s.bodyFat : null; });

      if (currentChart) currentChart.destroy();
      currentChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label:'Home Weight (lbs)', data:homeWeights, borderColor:'#ff9f0a', backgroundColor:'rgba(255,159,10,0.1)', tension:0.3, spanGaps:true },
            { label:'Scan Weight (lbs)', data:scanWeights, borderColor:'#0a84ff', tension:0.3 },
            { label:'Muscle Mass (lbs)', data:muscles, borderColor:'#30d158', tension:0.3 },
            { label:'Body Fat %', data:fats, borderColor:'#ff453a', tension:0.3, yAxisID:'y1' }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position:'bottom' } },
          scales: {
            y: { type:'linear', position:'left', title:{ display:true, text:'Weight / Muscle (lbs)' } },
            y1: { type:'linear', position:'right', title:{ display:true, text:'Body Fat %' }, grid:{ drawOnChartArea:false } }
          }
        }
      });
    });
  };

  // ---------- AI ----------
  const callDeepSeekAPI = async messages => {
    if (!deepseekKey) { toast('Enter your DeepSeek API key in Settings'); return null; }
    try {
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${deepseekKey}`},
        body:JSON.stringify({ model:'deepseek-chat', messages, temperature:0.8 })
      });
      const data = await res.json();
      return data.choices?.[0]?.message?.content;
    } catch(e) { toast('API error'); return null; }
  };

  const sendToDeepSeekWeb = prompt => window.open(`https://chat.deepseek.com/?q=${encodeURIComponent(prompt)}`, '_blank');

  const appendChatMessage = (role, text) => {
    const div = document.createElement('div'); div.className = `chat-message chat-${role}`; div.textContent = text;
    document.getElementById('chatMessages').appendChild(div);
    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
  };

  const sendChat = async () => {
    const input = document.getElementById('chatInput'); const msg = input.value.trim(); if (!msg) return;
    appendChatMessage('user', msg); input.value = '';
    if (aiMode === 'web' || !deepseekKey) { sendToDeepSeekWeb(msg); return; }
    const reply = await callDeepSeekAPI([...getChatContext(), { role:'user', content:msg }]);
    if (reply) appendChatMessage('ai', reply);
  };

  const getChatContext = () => {
    const messages = [];
    if (chatHistory) messages.push({ role:'system', content: `Previous conversation:\n${chatHistory}` });
    return messages;
  };

  const buildAISummary = plan => plan.days.map(day => `
Day: ${day.day}
Meals: ${day.meals.map(m => `${m.completed?'[x]':'[ ]'} ${m.name} (Ate:${m.ateNotes||''}) P:${m.protein||0} C:${m.carbs||0} F:${m.fat||0}`).join(', ')}
Workouts: ${(day.workoutBlocks||[]).map(b => b.type==='class' ? `Class: ${b.name} (${b.duration} min, intensity ${b.intensity}%)` : b.name + ': ' + b.exercises.map(e => `${e.completed?'[x]':'[ ]'} ${e.name} ${e.prescribedSetsReps} ${e.prescribedWeight||''} (Act: ${e.weight||'-'}x${e.reps||'-'} RPE:${e.rpe||'-'})`).join('; '))}
Weight: ${day.dailyWeight||'-'} Water: ${day.waterOz||'-'}`).join('\n---\n');

  const aiWeeklyReport = async () => {
    const w = getCurrentWeek(); if (!w) return toast('No data');
    const summary = buildAISummary(w.plan);
    if (aiMode==='web' || !deepseekKey) { sendToDeepSeekWeb(`${summary}\n\nProvide a concise weekly debrief.`); return; }
    const reply = await callDeepSeekAPI([...getChatContext(), { role:'user', content: `${summary}\n\nProvide a concise weekly debrief.` }]);
    if (reply) { appendChatMessage('user', 'Weekly report request'); appendChatMessage('ai', reply); }
  };

  const aiShoppingList = async () => {
    const w = getCurrentWeek(); if (!w) return;
    const meals = w.plan.days.map(d => `${d.day}: ${d.meals.map(m=>m.name).join(', ')}`).join('\n');
    if (aiMode==='web' || !deepseekKey) { sendToDeepSeekWeb(`Based on this meal plan:\n${meals}\n\nGenerate a grocery list grouped by day.`); return; }
    const reply = await callDeepSeekAPI([...getChatContext(), { role:'user', content: `Based on this meal plan:\n${meals}\n\nGenerate a grocery list grouped by day.` }]);
    if (reply) { appendChatMessage('user', 'Grocery list request'); appendChatMessage('ai', reply); }
  };

  const aiSmartProgression = async () => {
    const w = getCurrentWeek(); if (!w) return;
    const summary = buildAISummary(w.plan);
    if (aiMode==='web' || !deepseekKey) { sendToDeepSeekWeb(`${summary}\n\nRewrite my entire workout week (SECTION 2) adjusting exercises, sets, reps, weights based on progress, injuries, and chat history. Keep meals unchanged.`); closeModal('newWeekModal'); return; }
    const reply = await callDeepSeekAPI([...getChatContext(), { role:'user', content: `${summary}\n\nRewrite my entire workout week (SECTION 2) adjusting exercises, sets, reps, weights based on progress, injuries, and chat history. Keep meals unchanged.` }]);
    if (reply) { appendChatMessage('user', 'AI Smart Progression request'); appendChatMessage('ai', reply); closeModal('newWeekModal'); }
  };

  const autoGenNextWeek = () => {
    const w = getCurrentWeek(); if (!w) return;
    const np = JSON.parse(JSON.stringify(w.plan));
    np.days.forEach(d => {
      (d.workoutBlocks||[]).forEach(b => b.exercises.forEach(e => { if (e.prescribedWeight) { const n = parseFloat(e.prescribedWeight); if (!isNaN(n)) e.prescribedWeight = (n+5)+' lbs'; } e.completed=false; e.weight=''; e.reps=''; e.rpe='5'; }));
      d.meals.forEach(m => { m.completed=false; m.ateNotes=''; m.protein=''; m.carbs=''; m.fat=''; });
      d.notes='';
    });
    weekHistory.push({ id: Date.now().toString(), startDate: new Date().toISOString(), plan: np });
    currentWeekIndex = weekHistory.length-1; saveHistory();
    navigateTo('tracker'); toast('+5 lbs applied');
    closeModal('newWeekModal');
  };

  // ---------- CHAT IMPORT ----------
  const importChatFromHome = file => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      chatHistory = text; localStorage.setItem('deepseekChatHistory', chatHistory); toast('Chat history saved!');
      const plan = parsePlan(text);
      if (plan.days.length && confirm('Plan found in chat. Load it as current week?')) {
        weekHistory.push({ id: Date.now().toString(), startDate: new Date().toISOString(), plan });
        currentWeekIndex = weekHistory.length-1; saveHistory(); navigateTo('tracker');
      } else toast('No plan found in chat.');
    };
    reader.readAsText(file);
  };

  // ---------- SETTINGS / SCANS ----------
  const renderSettings = () => {
    document.getElementById('aiModeSelect').value = aiMode;
    document.getElementById('apiKeyInput').value = deepseekKey;
    renderScans();
  };

  const saveApiKey = () => {
    deepseekKey = document.getElementById('apiKeyInput').value.trim();
    localStorage.setItem('deepseekKey', deepseekKey); toast('API key saved');
  };

  const renderScans = async () => {
    const scans = await getScans();
    document.getElementById('scansContainer').innerHTML = scans.map(s => `
      <div style="display:inline-block; position:relative; margin:4px;">
        <img src="${s.image}" style="width:80px; border-radius:8px;" onclick="window.open('${s.image}')">
        <button class="btn btn-sm" style="position:absolute; top:-8px; right:-8px; background:var(--red); color:#fff; border-radius:50%;" id="deleteScan_${s.id}">×</button>
      </div>`).join('');
    document.querySelectorAll('[id^="deleteScan_"]').forEach(btn => btn.addEventListener('click', () => deleteScanFromDB(+btn.id.split('_')[1])));
  };

  const handleScanUpload = async files => {
    if (!files.length) return;
    for (let f of files) {
      const base64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); });
      await addScan(base64, new Date().toISOString());
    }
    toast(`Added ${files.length} scan(s)`); renderScans();
  };

  const deleteScanFromDB = async id => { await deleteScan(id); toast('Scan deleted'); renderScans(); };

  const analyzeLastScan = async () => {
    const scans = await getScans(); if (!scans.length) return toast('No scans');
    currentScanId = scans[scans.length-1].id;
    toast('Analyzing...');
    try {
      if (!tesseractWorker) tesseractWorker = await Tesseract.createWorker('eng');
      const { data: { text } } = await tesseractWorker.recognize(scans[scans.length-1].image);
      // extract values
      const weightMatch = text.match(/(?:Weight|Total Body Weight)\s*[:\s]*(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i) || text.match(/(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i);
      const muscleMatch = text.match(/(?:Skeletal Muscle Mass|Muscle Mass|Lean Body Mass)\s*[:\s]*(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i);
      const fatMatch = text.match(/(?:Body Fat|Percent Body Fat|Fat %)\s*[:\s]*(\d+(?:\.\d+)?)\s*%/i);
      const dateMatch = text.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})|(\d{4}-\d{2}-\d{2})|(\d{1,2}\.\d{1,2}\.\d{2,4})/);
      let detectedDate = '';
      if (dateMatch) {
        const d = new Date(dateMatch[0]); if (!isNaN(d)) detectedDate = d.toISOString().split('T')[0];
      }
      document.getElementById('scanWeightInput').value = weightMatch ? weightMatch[1] : '';
      document.getElementById('scanMuscleInput').value = muscleMatch ? muscleMatch[1] : '';
      document.getElementById('scanFatInput').value = fatMatch ? fatMatch[1] : '';
      document.getElementById('scanDateInput').value = detectedDate || new Date().toISOString().split('T')[0];
      document.getElementById('scanDataContent').innerHTML = `<p>Extracted values. Verify and set the correct date.</p><pre style="font-size:12px; max-height:100px; overflow:auto;">${text}</pre>`;
      openModal('scanDataModal');
    } catch(e) { toast('OCR failed. Please try again.'); }
  };

  const saveScanData = async () => {
    const scanDate = document.getElementById('scanDateInput').value;
    const weight = parseFloat(document.getElementById('scanWeightInput').value);
    const muscleMass = parseFloat(document.getElementById('scanMuscleInput').value);
    const bodyFat = parseFloat(document.getElementById('scanFatInput').value);
    if (!scanDate || (isNaN(weight) && isNaN(muscleMass) && isNaN(bodyFat))) return toast('Please enter at least one value and a date.');
    await updateScan(currentScanId, { scanDate, weight: isNaN(weight)?null:weight, muscleMass: isNaN(muscleMass)?null:muscleMass, bodyFat: isNaN(bodyFat)?null:bodyFat });
    closeModal('scanDataModal'); toast('Scan data saved!'); renderHome(); renderScans();
  };

  // ---------- EXPORT ----------
  const exportPDF = () => {
    const plan = getCurrentPlan(); if (!plan) return toast('No plan data');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    doc.setFontSize(16); doc.text('Weekly Summary', 20, y); y += 10;
    doc.setFontSize(11);
    plan.days.forEach(day => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFont(undefined, 'bold'); doc.text(`=== ${day.day} ===`, 20, y); y += 6; doc.setFont(undefined, 'normal');
      day.meals.forEach(m => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(`${m.completed?'[x]':'[ ]'} ${m.name} (P:${m.protein||0} C:${m.carbs||0} F:${m.fat||0})`, 25, y); y += 6;
      });
      (day.workoutBlocks||[]).forEach(b => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(`${b.name} ${b.time ? '('+b.time+')' : ''}`, 25, y); y += 6;
        b.exercises.forEach(e => {
          if (y > 270) { doc.addPage(); y = 20; }
          let line = `${e.completed?'[x]':'[ ]'} ${e.name} (${e.prescribedSetsReps||''})`;
          if (e.weight) line += ` W:${e.weight}`; if (e.reps) line += ` R:${e.reps}`; if (e.rpe) line += ` RPE:${e.rpe}`;
          doc.text(line, 30, y); y += 6;
        });
      });
      y += 4;
    });

    // Daily weight table
    if (y > 240) { doc.addPage(); y = 20; }
    doc.setFontSize(13); doc.setFont(undefined, 'bold'); doc.text('Daily Home Scale Weights', 20, y); y += 8;
    doc.setFontSize(10); doc.setFont(undefined, 'normal');
    doc.text('Date', 20, y); doc.text('Weight (lbs)', 60, y); y += 6;
    weekHistory.forEach(w => {
      const base = new Date(w.startDate);
      w.plan.days.forEach((d, i) => {
        if (d.dailyWeight) {
          const date = new Date(base); date.setDate(date.getDate()+i);
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(date.toLocaleDateString(), 20, y); doc.text(String(d.dailyWeight), 60, y); y += 6;
        }
      });
    });

    // Scan data
    getScans().then(scans => {
      const filtered = scans.filter(s => s.scanDate && (s.weight!=null || s.muscleMass!=null || s.bodyFat!=null)).sort((a,b) => new Date(a.scanDate)-new Date(b.scanDate));
      if (filtered.length > 0) {
        if (y > 240) { doc.addPage(); y = 20; }
        doc.setFontSize(13); doc.setFont(undefined, 'bold'); doc.text('Body Composition Scans', 20, y); y += 8;
        doc.setFontSize(10); doc.setFont(undefined, 'normal');
        doc.text('Date', 20, y); doc.text('Weight (lbs)', 55, y); doc.text('Muscle Mass (lbs)', 95, y); doc.text('Body Fat %', 145, y); y += 6;
        filtered.forEach(s => {
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(new Date(s.scanDate).toLocaleDateString(), 20, y);
          doc.text(s.weight!=null ? String(s.weight) : '-', 55, y);
          doc.text(s.muscleMass!=null ? String(s.muscleMass) : '-', 95, y);
          doc.text(s.bodyFat!=null ? String(s.bodyFat) : '-', 145, y);
          y += 6;
        });
      }
      doc.save('weekly-summary.pdf'); toast('PDF downloaded with scan & home weight data');
    });
  };

  const copyToClipboard = () => {
    const plan = getCurrentPlan(); if (!plan) return;
    let t = ''; plan.days.forEach(d => {
      t += `=== ${d.day} ===\n`;
      d.meals.forEach(m => t += `${m.name} (P:${m.protein} C:${m.carbs} F:${m.fat})\n`);
      (d.workoutBlocks||[]).forEach(b => b.exercises.forEach(e => t += `${e.name} ${e.prescribedSetsReps} W:${e.weight} R:${e.reps}\n`));
      t += '\n';
    });
    navigator.clipboard.writeText(t).then(()=>toast('Copied'));
  };

  // ---------- HELP ----------
  const showHelp = () => { helpSlide = 0; renderHelpSlide(); openModal('helpModal'); };
  const renderHelpSlide = () => {
    document.getElementById('helpSlides').innerHTML = `<h2>${helpSlidesData[helpSlide].title}</h2><p>${helpSlidesData[helpSlide].text}</p>`;
    document.getElementById('helpNextBtn').textContent = helpSlide<helpSlidesData.length-1 ? 'Next →' : 'Done';
  };
  const nextHelpSlide = () => {
    if (helpSlide < helpSlidesData.length-1) { helpSlide++; renderHelpSlide(); }
    else { closeModal('helpModal'); }
  };

  // ---------- HISTORY / TEMPLATES ----------
  const renderHistory = () => {
    document.getElementById('historyList').innerHTML = weekHistory.map((w,i) => `<div style="padding:8px; cursor:pointer;" id="loadWeek_${i}">Week ${new Date(w.startDate).toLocaleDateString()} – ${calcProgress(w.plan)}%</div>`).join('');
    document.querySelectorAll('[id^="loadWeek_"]').forEach(el => el.addEventListener('click', () => loadWeek(+el.id.split('_')[1])));
    document.getElementById('templateList').innerHTML = templates.map((t,i) => `<span class="btn btn-sm" id="loadTemplate_${i}">${t.name}</span>`).join(' ');
    document.querySelectorAll('[id^="loadTemplate_"]').forEach(el => el.addEventListener('click', () => loadTemplate(+el.id.split('_')[1])));
  };

  const loadWeek = i => { currentWeekIndex = i; saveHistory(); navigateTo('tracker'); };
  const loadTemplate = i => { if (!templates[i]) return; weekHistory.push({ id:Date.now().toString(), startDate:new Date().toISOString(), plan: JSON.parse(JSON.stringify(templates[i].plan)) }); currentWeekIndex = weekHistory.length-1; saveHistory(); navigateTo('tracker'); };
  const saveTemplate = () => {
    const plan = getCurrentPlan(); if (!plan) return;
    const name = prompt('Template name:'); if (!name) return;
    templates.push({ name, plan }); localStorage.setItem('templates', JSON.stringify(templates)); renderHistory(); toast('Template saved');
  };

  // ---------- MODALS ----------
  const openModal = id => document.getElementById(id).style.display = 'flex';
  const closeModal = id => document.getElementById(id).style.display = 'none';

  // ---------- TABS ----------
  document.getElementById('pasteTabBtn').addEventListener('click', ()=>{
    document.getElementById('pasteTabBtn').classList.add('active'); document.getElementById('linkTabBtn').classList.remove('active');
    document.getElementById('pasteDiv').style.display='block'; document.getElementById('linkDiv').style.display='none';
  });
  document.getElementById('linkTabBtn').addEventListener('click', ()=>{
    document.getElementById('linkTabBtn').classList.add('active'); document.getElementById('pasteTabBtn').classList.remove('active');
    document.getElementById('linkDiv').style.display='block'; document.getElementById('pasteDiv').style.display='none';
  });

  // ---------- INPUT ACTIONS ----------
  const loadFromPaste = () => {
    const text = document.getElementById('planText').value.trim(); if (!text) return toast('Paste your plan');
    try {
      const plan = parsePlan(text); if (!plan.days.length) return toast('No plan found. Make sure both sections are present.');
      weekHistory.push({ id: Date.now().toString(), startDate: new Date().toISOString(), plan }); currentWeekIndex = weekHistory.length-1; saveHistory();
      navigateTo('tracker'); toast('Plan loaded!');
    } catch(e) { toast('Error parsing plan.'); }
  };

  const loadFromLink = async () => {
    const link = document.getElementById('docLink').value.trim(); const m = link.match(/\/d\/([a-zA-Z0-9_-]+)/); if (!m) return toast('Invalid link');
    try {
      const res = await fetch(`https://docs.google.com/document/d/${m[1]}/export?format=txt`); const text = await res.text();
      const plan = parsePlan(text); if (!plan.days.length) return toast('No plan found in the doc.');
      weekHistory.push({ id: Date.now().toString(), startDate: new Date().toISOString(), plan }); currentWeekIndex = weekHistory.length-1; saveHistory();
      navigateTo('tracker'); toast('Fetched & loaded');
    } catch(e) { toast('Error fetching document.'); }
  };

  // ---------- GLOBAL BINDINGS ----------
  // Home tiles
  document.getElementById('tileImportPlan').addEventListener('click', () => navigateTo('input'));
  document.getElementById('tileLoadChat').addEventListener('click', () => document.getElementById('chatHistoryFileInputHome').click());
  document.getElementById('tileCoach').addEventListener('click', () => navigateTo('coach'));
  document.getElementById('tileSettings').addEventListener('click', () => navigateTo('settings'));

  // Input page
  document.getElementById('backToHomeFromInput').addEventListener('click', () => navigateTo('home'));
  document.getElementById('parsePasteBtn').addEventListener('click', loadFromPaste);
  document.getElementById('fetchLinkBtn').addEventListener('click', loadFromLink);

  // Tracker toolbar
  document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
  document.getElementById('copyClipBtn').addEventListener('click', copyToClipboard);
  document.getElementById('toggleExpandBtn').addEventListener('click', toggleAllDays);
  document.getElementById('goToTodayBtn').addEventListener('click', goToToday);
  document.getElementById('newWeekBtn').addEventListener('click', () => openModal('newWeekModal'));

  // Coach
  document.getElementById('sendChatBtn').addEventListener('click', sendChat);
  document.getElementById('aiReportBtn').addEventListener('click', aiWeeklyReport);
  document.getElementById('shoppingListBtn').addEventListener('click', aiShoppingList);
  document.getElementById('aiProgressionBtn').addEventListener('click', aiSmartProgression);

  // History
  document.getElementById('saveTemplateBtn').addEventListener('click', saveTemplate);

  // Settings
  document.getElementById('saveApiKeyBtn').addEventListener('click', saveApiKey);
  document.getElementById('addScanBtn').addEventListener('click', () => document.getElementById('scanFileInput').click());
  document.getElementById('scanFileInput').addEventListener('change', e => handleScanUpload(e.target.files));
  document.getElementById('analyzeLastScanBtn').addEventListener('click', analyzeLastScan);
  document.getElementById('helpBtn').addEventListener('click', showHelp);
  document.getElementById('darkModeBtn').addEventListener('click', () => {
    darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('light', !darkMode);
  });

  // Help modal
  document.getElementById('helpSkipBtn').addEventListener('click', () => closeModal('helpModal'));
  document.getElementById('helpNextBtn').addEventListener('click', nextHelpSlide);

  // New week modal
  document.getElementById('newWeekPasteBtn').addEventListener('click', () => { closeModal('newWeekModal'); navigateTo('input'); });
  document.getElementById('newWeekLinkBtn').addEventListener('click', () => { closeModal('newWeekModal'); navigateTo('input'); document.getElementById('linkTabBtn').click(); });
  document.getElementById('autoGenBtn').addEventListener('click', () => { closeModal('newWeekModal'); autoGenNextWeek(); });
  document.getElementById('aiProgModalBtn').addEventListener('click', () => { closeModal('newWeekModal'); aiSmartProgression(); });
  document.getElementById('cancelNewWeekBtn').addEventListener('click', () => closeModal('newWeekModal'));

  // Scan data modal
  document.getElementById('saveScanDataBtn').addEventListener('click', saveScanData);
  document.getElementById('cancelScanDataBtn').addEventListener('click', () => closeModal('scanDataModal'));

  // Chat import
  document.getElementById('chatHistoryFileInputHome').addEventListener('change', e => importChatFromHome(e.target.files[0]));

  // AI mode change
  document.getElementById('aiModeSelect').addEventListener('change', function() { aiMode = this.value; localStorage.setItem('aiMode', aiMode); });

  // Navigation
  document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => navigateTo(item.dataset.page)));

  // ---------- INIT ----------
  window.addEventListener('DOMContentLoaded', async () => {
    await openDB();
    darkMode = localStorage.getItem('darkMode') !== 'false';
    document.documentElement.classList.toggle('light', !darkMode);
    loadHistory();
    aiMode = localStorage.getItem('aiMode') || 'web';
    deepseekKey = localStorage.getItem('deepseekKey') || '';
    if (weekHistory.length && currentWeekIndex>=0) navigateTo('tracker');
    else navigateTo('home');
    renderHome();
  });
})();
</script>
</body>
</html>
