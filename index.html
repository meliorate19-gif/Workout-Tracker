<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <title>Fitness Tracker</title>
  <style>
    :root { --bg: #0f0f0f; --card: #1c1c1e; --text: #fff; --sub: #8e8e93; --accent: #30d158; --blue: #0a84ff; --red: #ff453a; --orange: #ff9f0a; --border: #2c2c2e; --radius: 20px; }
    @media (prefers-color-scheme: light) { body { --bg: #fff; --card: #f2f2f7; --text: #1c1c1e; --sub: #6e6e73; --border: #e5e5ea; } }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0 0 100px; min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; }
    .app { max-width:600px; margin:0 auto; padding:16px; }
    h1 { font-size:28px; font-weight:800; text-align:center; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); display:flex; justify-content:space-around; align-items:center; height:70px; padding-bottom:env(safe-area-inset-bottom,10px); border-top:1px solid var(--border); z-index:10; }
    .nav-item { flex:1; text-align:center; font-size:11px; color:var(--sub); cursor:pointer; display:flex; flex-direction:column; align-items:center; }
    .nav-item.active { color:var(--blue); }
    .card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
    .btn { padding:14px 20px; border-radius:14px; border:none; font-size:16px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; background:var(--border); color:var(--text); }
    .btn-primary { background:var(--blue); color:#fff; width:100%; justify-content:center; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--blue); }
    .btn-sm { padding:8px 16px; font-size:14px; }
    .btn-accent { background:var(--accent); color:#000; }
    .input, textarea, select { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px; }
    .progress-bar { height:8px; background:var(--border); border-radius:4px; margin:8px 0; }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; }
    .toast { position:fixed; bottom:85px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 24px; border-radius:20px; font-weight:600; opacity:0; transition:0.2s; z-index:20; }
    .toast.show { opacity:1; }
    .page { display:none; }
    .page.active { display:block; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:30; }
    .modal-box { background:var(--card); border-radius:24px; padding:24px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; }
    .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .home-tile { background:var(--card); border-radius:16px; padding:20px; text-align:center; cursor:pointer; }
    .meal-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
    .check-circle { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); margin-right:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .check-circle.done { background:var(--accent); border-color:var(--accent); }
    .check-circle.done::after { content:'✓'; color:#000; font-weight:bold; font-size:14px; }
    .macro-chips { display:flex; gap:4px; margin-left:10px; flex-wrap:wrap; align-items:center; }
    .macro-quick { background:var(--border); border:none; padding:4px 8px; border-radius:12px; font-size:12px; cursor:pointer; color:var(--text); }
    .exercise-row { padding:12px 0; border-bottom:1px solid var(--border); }
    .exercise-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
    .timer-big { background:var(--border); border:none; color:var(--text); padding:8px 16px; border-radius:12px; font-size:16px; display:flex; align-items:center; gap:8px; cursor:pointer; }
    .timer-display { font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; min-width:60px; }
    .class-block { background:var(--bg); border-radius:12px; padding:12px; margin:8px 0; }
    .intensity-bar { width:100%; height:8px; background:var(--border); border-radius:4px; margin:6px 0; }
    .intensity-fill { height:100%; border-radius:4px; background:var(--orange); }
    .macro-live { margin-left:34px; margin-top:4px; font-size:13px; color:var(--sub); }
    .chat-message { padding:8px; border-radius:12px; margin:4px 0; }
    .chat-user { background:var(--blue); color:#fff; align-self:flex-end; text-align:right; }
    .chat-ai { background:var(--border); }
  </style>
</head>
<body>
<div class="app">
  <div class="toast" id="toast"></div>

  <!-- Home Page -->
  <div id="homePage" class="page active">
    <h1>🏠 Dashboard</h1>
    <div class="card" id="overviewCard"></div>
    <div class="card">
      <h3>📈 Body Composition & Home Scale</h3>
      <canvas id="homeChart" height="200"></canvas>
    </div>
    <div class="home-grid">
      <div class="home-tile" onclick="navigateTo('input')">📋<br>Import Plan</div>
      <div class="home-tile" onclick="document.getElementById('chatHistoryFileInputHome').click()">💬<br>Load Chat</div>
      <input type="file" accept=".txt" id="chatHistoryFileInputHome" style="display:none;" onchange="importChatFromHome(this.files[0])">
      <div class="home-tile" onclick="navigateTo('coach')">🧠<br>Coach</div>
      <div class="home-tile" onclick="navigateTo('settings')">⚙️<br>Settings</div>
    </div>
  </div>

  <!-- Input Page -->
  <div id="inputPage" class="page">
    <button class="btn btn-outline btn-sm" onclick="navigateTo('home')">← Home</button>
    <div style="display:flex; gap:2px; background:var(--card); border-radius:12px; padding:4px; margin:16px 0;">
      <button class="btn tab-btn active" id="pasteTabBtn">📋 Paste</button>
      <button class="btn tab-btn" id="linkTabBtn">🔗 Link</button>
    </div>
    <div class="card">
      <div id="pasteDiv"><textarea class="input" id="planText" rows="8" placeholder="Paste your plan"></textarea><button class="btn btn-primary" onclick="loadFromPaste()">✨ Parse & Load</button></div>
      <div id="linkDiv" style="display:none;"><input class="input" id="docLink" placeholder="Google Doc link"><button class="btn btn-primary" onclick="loadFromLink()">🔍 Fetch & Parse</button></div>
    </div>
  </div>

  <!-- Tracker Page -->
  <div id="trackerPage" class="page">
    <div id="weekProgressCard" class="card"></div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
      <button class="btn btn-outline btn-sm" onclick="exportPDF()">📄 PDF</button>
      <button class="btn btn-outline btn-sm" onclick="copyToClipboard()">📋 Copy</button>
      <button class="btn btn-outline btn-sm" onclick="toggleAllDays()">📅 Expand/Collapse</button>
      <button class="btn btn-outline btn-sm" onclick="goToToday()">📍 Today</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('newWeekModal').style.display='flex'">🗑 New Week</button>
    </div>
    <div id="daysContainer"></div>
  </div>

  <!-- Coach Page -->
  <div id="coachPage" class="page">
    <div class="card">
      <h3>🧠 AI Coach</h3>
      <div id="chatMessages" style="height:250px; background:var(--bg); border-radius:12px; margin:10px 0; overflow-y:auto; padding:10px; display:flex; flex-direction:column;"></div>
      <div style="display:flex; gap:6px;">
        <input class="input" id="chatInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="btn btn-primary" style="width:auto;" onclick="sendChat()">📨</button>
      </div>
      <div style="display:flex; gap:6px; margin-top:10px; flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick="aiWeeklyReport()">📊 Report</button>
        <button class="btn btn-outline btn-sm" onclick="aiShoppingList()">🛒 Grocery</button>
        <button class="btn btn-accent btn-sm" onclick="aiSmartProgression()">🤖 Next Week</button>
      </div>
    </div>
  </div>

  <!-- History Page -->
  <div id="historyPage" class="page">
    <div class="card">
      <h3>📚 Past Weeks</h3>
      <div id="historyList"></div>
      <hr style="border-color:var(--border); margin:16px 0;">
      <h4>🗂 Templates</h4>
      <div id="templateList"></div>
      <button class="btn btn-outline btn-sm" onclick="saveTemplate()">💾 Save Current</button>
    </div>
  </div>

  <!-- Settings Page -->
  <div id="settingsPage" class="page">
    <div class="card">
      <h3>⚙️ Settings</h3>
      <label>AI Mode <select class="input" id="aiModeSelect"><option value="web">Web (Free)</option><option value="api">API Key</option></select></label>
      <div id="apiKeySection" style="display:block;">
        <label>DeepSeek API Key <input class="input" type="password" id="apiKeyInput"></label>
        <button class="btn btn-primary btn-sm" onclick="saveApiKey()">Save</button>
      </div>
      <hr style="border-color:var(--border); margin:16px 0;">
      <h4>📸 Body Scans</h4>
      <div id="scansContainer"></div>
      <input type="file" accept="image/*" multiple id="scanFileInput" style="display:none;" onchange="handleScanUpload(this.files)">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('scanFileInput').click()">➕ Add Scans</button>
      <button class="btn btn-outline btn-sm" onclick="analyzeLastScan()">🔬 Analyze Latest</button>
      <hr style="border-color:var(--border); margin:16px 0;">
      <button class="btn btn-outline" onclick="showHelp()">❓ Help</button>
      <button class="btn btn-outline" onclick="toggleTheme()">🌓 Theme</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="home" onclick="navigateTo('home')">🏠 Home</div>
  <div class="nav-item" data-page="tracker" onclick="navigateTo('tracker')">📋 Tracker</div>
  <div class="nav-item" data-page="coach" onclick="navigateTo('coach')">🧠 Coach</div>
  <div class="nav-item" data-page="history" onclick="navigateTo('history')">📚 History</div>
  <div class="nav-item" data-page="settings" onclick="navigateTo('settings')">⚙️ Settings</div>
</div>

<!-- Modals -->
<div id="newWeekModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>New Week</h3>
    <button class="btn btn-primary" onclick="newWeekPaste()">📋 Paste text</button>
    <button class="btn btn-outline" onclick="newWeekLink()" style="margin-top:8px;">🔗 Google Doc link</button>
    <button class="btn btn-outline" onclick="autoGenNextWeek()" style="margin-top:8px;">🤖 Auto (+5 lbs)</button>
    <button class="btn btn-accent" onclick="aiSmartProgression()" style="margin-top:8px;">🧠 AI Smart Progression</button>
    <button class="btn btn-outline" onclick="document.getElementById('newWeekModal').style.display='none'" style="margin-top:8px; width:100%;">Cancel</button>
  </div>
</div>
<div id="helpModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div id="helpSlides"></div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn btn-outline" onclick="document.getElementById('helpModal').style.display='none'">Close</button>
      <button class="btn btn-primary" id="helpNextBtn" onclick="nextHelpSlide()">Next →</button>
    </div>
  </div>
</div>
<div id="scanDataModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>Scan Analysis</h3>
    <div id="scanDataContent" style="margin-bottom:12px;"></div>
    <label>Date of Scan</label>
    <input type="date" class="input" id="scanDateInput">
    <label>Weight (lbs)</label>
    <input type="number" class="input" id="scanWeightInput" step="0.1">
    <label>Skeletal Muscle Mass (lbs)</label>
    <input type="number" class="input" id="scanMuscleInput" step="0.1">
    <label>Body Fat %</label>
    <input type="number" class="input" id="scanFatInput" step="0.1">
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn btn-primary" onclick="saveScanData()">Save</button>
      <button class="btn btn-outline" onclick="document.getElementById('scanDataModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(function() {
  // ---------- STATE ----------
  let weekHistory = [], currentWeekIndex = -1;
  const daysOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  let allExpanded = true;
  let darkMode = localStorage.getItem('darkMode') !== 'false';
  let deepseekKey = localStorage.getItem('deepseekKey') || '';
  let chatHistory = localStorage.getItem('deepseekChatHistory') || '';
  let templates = JSON.parse(localStorage.getItem('templates') || '[]');
  let aiMode = localStorage.getItem('aiMode') || 'web';
  let db;
  const DB_NAME = 'BodyScansDB', STORE_NAME = 'scans';
  let currentChart = null;
  let activeTimers = {};
  let tesseractWorker = null;
  let helpSlide = 0;
  const helpSlides = [
    {title:'Welcome!',text:'Your AI-powered fitness tracker. Log workouts, meals, and chat with DeepSeek directly.'},
    {title:'Home',text:'Dashboard with body composition trends from scans and home scale.'},
    {title:'Tracker',text:'Check off meals, fill macros, log sets/weight/reps/RPE. Timers for circuits and classes.'},
    {title:'Coach',text:'Integrated DeepSeek AI – ask questions, get reports, generate plans.'},
    {title:'Settings',text:'Enter DeepSeek API key, manage body scans, and import chat history.'}
  ];
  let currentScanId = null;

  function toast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ---------- INDEXEDDB ----------
  async function openDB() {
    return new Promise((res,rej) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onerror = rej;
      req.onsuccess = () => { db = req.result; res(); };
      req.onupgradeneeded = () => {
        const store = req.result.createObjectStore(STORE_NAME, { keyPath:'id', autoIncrement:true });
      };
    });
  }
  async function addScan(img, date) {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).add({ image:img, uploadDate:date, scanDate:'', weight:null, muscleMass:null, bodyFat:null, notes:'' });
      tx.oncomplete = res;
    });
  }
  async function updateScan(id, data) {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(id);
      req.onsuccess = () => {
        const scan = req.result;
        Object.assign(scan, data);
        store.put(scan);
        tx.oncomplete = res;
      };
    });
  }
  async function getScans() {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result);
    });
  }
  async function deleteScan(id) {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(id);
      tx.oncomplete = res;
    });
  }

  // ---------- STORAGE ----------
  function saveHistory() { localStorage.setItem('weekHistory', JSON.stringify(weekHistory)); localStorage.setItem('currentWeekIndex', currentWeekIndex); }
  function loadHistory() {
    const h = localStorage.getItem('weekHistory');
    if (h) {
      weekHistory = JSON.parse(h);
      currentWeekIndex = parseInt(localStorage.getItem('currentWeekIndex')) || (weekHistory.length - 1);
      if (currentWeekIndex < 0 || currentWeekIndex >= weekHistory.length) currentWeekIndex = weekHistory.length - 1;
    } else { weekHistory = []; currentWeekIndex = -1; }
    saveHistory();
  }
  function getCurrentWeek() { return (weekHistory.length && currentWeekIndex >= 0) ? weekHistory[currentWeekIndex] : null; }
  function getCurrentPlan() { const w = getCurrentWeek(); return w ? w.plan : null; }
  function saveCurrentWeek() { if (getCurrentWeek()) { weekHistory[currentWeekIndex] = getCurrentWeek(); saveHistory(); } }

  // ---------- PARSER (full – as before) ----------
  function parsePlan(text) {
    const mealSec = text.match(/SECTION\s*1\s*:?\s*MEAL\s*PLAN/i);
    const workSec = text.match(/SECTION\s*2\s*:?\s*(WEEKLY\s*)?WORKOUT\s*SCHEDULE/i);
    if (mealSec && workSec) return parseStructured(text, mealSec.index, workSec.index);
    else return parseFreeform(text);
  }
  function buildDays(dayMap) {
    return { days: daysOrder.map(d => ({ ...dayMap[d], notes:'' })).filter(d => d.meals.length || d.workoutBlocks.length) };
  }
  function parseStructured(text, mealStart, workStart) {
    const dayMap = {};
    daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const mealText = text.substring(mealStart, workStart);
    const workoutText = text.substring(workStart);
    let curMealDay = null;
    mealText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) { curMealDay = dayMatch; return; }
      if (curMealDay && /^[·•\-*]\s/.test(line)) {
        let content = line.replace(/^[·•\-*]\s*/, '').trim();
        const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
        let time='', desc=content;
        if (timeMatch) { time=timeMatch[1].trim(); desc=timeMatch[2].trim(); }
        desc = desc.replace(/\s*~\s*\d+.*$/,'').trim();
        if (desc) dayMap[curMealDay].meals.push({
          id: crypto.randomUUID(), name:desc, time, completed:false,
          ateNotes:'', protein:'', carbs:'', fat:''
        });
      }
    });
    let curWorkDay = null, curBlock = null;
    workoutText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) {
        if (curBlock && (curBlock.type === 'class' || (curBlock.exercises && curBlock.exercises.length))) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        curWorkDay = dayMatch;
        curBlock = null;
        return;
      }
      if (!curWorkDay) return;
      const classMatch = line.match(/^·\s*Class\s*:\s*(.*)/i);
      if (classMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        const times = classMatch[1].match(/(\d{1,2}:\d{2}\s*[APMapm]*)\s*[-–—]\s*(\d{1,2}:\d{2}\s*[APMapm]*)/);
        let duration = '';
        if (times) {
          const start = new Date(`2025-01-01 ${times[1]}`);
          const end = new Date(`2025-01-01 ${times[2]}`);
          const mins = (end - start) / 60000;
          if (mins > 0) duration = String(mins);
        }
        curBlock = { type:'class', name:'Judo / Class', duration, intensity:50, notes:'' };
        return;
      }
      if (curBlock && curBlock.type === 'class') {
        if (/^·\s*Intensity/i.test(line)) {
          const percent = line.match(/(\d+)/);
          if (percent) curBlock.intensity = parseInt(percent[1]);
          return;
        }
        if (/^·\s*Notes/i.test(line)) return;
        return;
      }
      const partMatch = line.match(/^Part\s*(\d+)\s*:\s*(.*)/i);
      const circuitMatch = line.match(/^Format\s*:\s*(.*)/i);
      if (partMatch || circuitMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        const name = partMatch ? `Part ${partMatch[1]}: ${partMatch[2]}` : circuitMatch[1];
        const isCircuit = !!circuitMatch;
        let time = '';
        if (circuitMatch) {
          const t = circuitMatch[1].match(/(\d+)\s*-\s*min/);
          if (t) time = t[1] + ' min';
        }
        curBlock = { name, time, exercises:[], isCircuit, type:'workout' };
        return;
      }
      if (!curBlock) curBlock = { name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' };
      if (/^(Post-Workout|Pre-Class|Pre-Workout|Post-Class|Step\s+Exercise)/i.test(line)) return;
      if (/Exercise\s+Sets\s+Reps/i.test(line) || /^Actual/i.test(line) || /^Weights Used/i.test(line)) return;
      addExerciseToBlock(curBlock, line);
    });
    if (curBlock && (curBlock.type === 'class' || (curBlock.exercises && curBlock.exercises.length))) dayMap[curWorkDay].workoutBlocks.push(curBlock);
    return buildDays(dayMap);
  }
  function parseFreeform(text) {
    const dayMap = {};
    daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const lines = text.split('\n');
    let currentDay = null;
    let afterWorkout = false;
    for (let line of lines) {
      line = line.trim();
      if (!line) continue;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z0-9]/.test(line[d.length]));
      if (dayMatch) {
        currentDay = dayMatch;
        afterWorkout = false;
        continue;
      }
      if (!currentDay) continue;
      if (/^\s*\(.*\)\s*$/.test(line)) continue;
      if (/workout|training|circuit|class|density block/i.test(line)) {
        afterWorkout = true;
        const partMatch = line.match(/^Part\s*(\d+)\s*:\s*(.*)/i);
        const circuitMatch = line.match(/^Format\s*:\s*(.*)/i);
        if (partMatch || circuitMatch) {
          const name = partMatch ? `Part ${partMatch[1]}: ${partMatch[2]}` : circuitMatch[1];
          dayMap[currentDay].workoutBlocks.push({ name, time:'', exercises:[], isCircuit:!!circuitMatch, type:'workout' });
        }
        continue;
      }
      const classMatch = line.match(/^·?\s*Class\s*:\s*(.*)/i);
      if (classMatch) {
        const times = classMatch[1].match(/(\d{1,2}:\d{2}\s*[APMapm]*)\s*[-–—]\s*(\d{1,2}:\d{2}\s*[APMapm]*)/);
        let duration = '';
        if (times) {
          const start = new Date(`2025-01-01 ${times[1]}`);
          const end = new Date(`2025-01-01 ${times[2]}`);
          const mins = (end - start) / 60000;
          if (mins > 0) duration = String(mins);
        }
        dayMap[currentDay].workoutBlocks.push({ type:'class', name:'Judo / Class', duration, intensity:50, notes:'' });
        afterWorkout = true;
        continue;
      }
      if (/^·?\s*Intensity/i.test(line) && dayMap[currentDay].workoutBlocks.length && dayMap[currentDay].workoutBlocks[dayMap[currentDay].workoutBlocks.length-1].type === 'class') {
        const percent = line.match(/(\d+)/);
        if (percent) dayMap[currentDay].workoutBlocks[dayMap[currentDay].workoutBlocks.length-1].intensity = parseInt(percent[1]);
        continue;
      }
      if (/^·?\s*Notes/i.test(line)) continue;
      if (/^[·•\-*]\s/.test(line)) {
        const content = line.replace(/^[·•\-*]\s*/, '').trim();
        if (afterWorkout) {
          addExerciseToDay(dayMap[currentDay], content);
        } else {
          const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
          if (timeMatch) {
            let time = timeMatch[1].trim();
            let desc = timeMatch[2].trim();
            desc = desc.replace(/\s*~\s*\d+.*$/,'').trim();
            if (desc) dayMap[currentDay].meals.push({
              id: crypto.randomUUID(), name:desc, time, completed:false,
              ateNotes:'', protein:'', carbs:'', fat:''
            });
          } else {
            if (/\d+\s*x\s*\d+/.test(content) || /\d+\s*(sec|min|yds|lbs?)/.test(content)) {
              addExerciseToDay(dayMap[currentDay], content);
            } else {
              dayMap[currentDay].meals.push({
                id: crypto.randomUUID(), name:content, time:'', completed:false,
                ateNotes:'', protein:'', carbs:'', fat:''
              });
            }
          }
        }
      } else {
        if (afterWorkout && line.length > 3) {
          addExerciseToDay(dayMap[currentDay], line);
        }
      }
    }
    return buildDays(dayMap);
  }
  function addExerciseToDay(dayObj, line) {
    if (!dayObj.workoutBlocks.length || dayObj.workoutBlocks[dayObj.workoutBlocks.length-1].type !== 'workout') {
      dayObj.workoutBlocks.push({ name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' });
    }
    const block = dayObj.workoutBlocks[dayObj.workoutBlocks.length-1];
    addExerciseToBlock(block, line);
  }
  function addExerciseToBlock(block, line) {
    let exName=null, prescribed='', workSec=0, restSec=0, prescribedWeight='', sets='';
    const stationMatch = line.match(/^(.+?)\s+(\d+)\s*sec\s+(\d+)\s*sec/i);
    if (stationMatch && block.isCircuit) {
      exName = stationMatch[1].trim(); workSec = +stationMatch[2]; restSec = +stationMatch[3]; prescribed = `${workSec}s/${restSec}s`;
      const wM = line.match(/(\d+)\s*lbs?/i); if (wM) prescribedWeight = wM[1] + ' lbs';
    } else {
      let m = line.match(/^\d+\s+(.*?)\s+(\d+)\s*(?:min|sec)\s+(\d+-?\d*)/i);
      if (m) {
        exName = m[1].trim(); workSec = +m[2]*60; prescribed = m[3];
        const wM = line.match(/(\d+)\s*lb/i); if (wM) prescribedWeight = wM[1] + ' lbs';
      } else {
        m = line.match(/^([A-Z]):\s*(.*?)(?:\s+(\d+)\s+(\d+[\/\w]*))?\s+(\d+\s*sec)?/);
        if (m) {
          exName = m[2].trim();
          if (m[3] && m[4]) { sets = m[3]; prescribed = `${sets}x${m[4]}`; }
          if (m[5]) workSec = +m[5];
          const wM = line.match(/(\d+)\s*lb\b/i); if (wM) prescribedWeight = wM[1] + ' lbs';
        } else {
          const generic = line.match(/^(.+?)\s+(\d+)\s*x\s*(\d+)/i);
          if (generic) { exName = generic[1].trim(); sets = generic[2]; prescribed = `${sets}x${generic[3]}`; }
          else exName = line.split(/\s+/).slice(0,4).join(' ');
        }
      }
    }
    if (exName && exName.length>2) {
      block.exercises.push({
        id: crypto.randomUUID(), name: exName.charAt(0).toUpperCase()+exName.slice(1),
        prescribedSetsReps: prescribed, prescribedWeight, completed:false,
        sets: '', weight:'', reps:'', rpe:'5', workSec, restSec
      });
    }
  }

  // ---------- HELPERS ----------
  function calcProgress(plan) {
    let total=0, done=0;
    plan.days.forEach(d => {
      d.meals.forEach(m => { total++; if(m.completed) done++; });
      (d.workoutBlocks||[]).forEach(b => {
        if (b.type === 'class') return;
        b.exercises.forEach(e => { total++; if(e.completed) done++; });
      });
    });
    return total ? Math.round(done/total*100) : 0;
  }
  function exerciseCount(day) {
    let total = 0;
    (day.workoutBlocks||[]).forEach(b => {
      if (b.type === 'workout') total += b.exercises.length;
      else if (b.type === 'class') total++;
    });
    return total;
  }
  function calcDayMacros(day) {
    const p = (day.meals||[]).reduce((s,m) => s + (+m.protein||0), 0);
    const c = (day.meals||[]).reduce((s,m) => s + (+m.carbs||0), 0);
    const f = (day.meals||[]).reduce((s,m) => s + (+m.fat||0), 0);
    return { protein: p.toFixed(0), carbs: c.toFixed(0), fat: f.toFixed(0), cal: (p*4 + c*4 + f*9).toFixed(0) };
  }
  function rpeColor(val) {
    if (val <= 3) return 'var(--accent)';
    if (val <= 6) return 'var(--orange)';
    return 'var(--red)';
  }
  function formatSeconds(sec) { const m = Math.floor(sec/60), s = sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }
  function formatMinutes(mins) { return formatSeconds(parseInt(mins)*60); }
  function parseTimeToSecs(str) { const mins = str.match(/(\d+)\s*min/); return mins ? +mins[1]*60 : 0; }

  // ---------- TRACKER RENDER ----------
  function renderTracker() {
    const plan = getCurrentPlan();
    if (!plan) return;
    document.getElementById('weekProgressCard').innerHTML = `<h3>Progress: ${calcProgress(plan)}%</h3><div class="progress-bar"><div class="progress-fill" style="width:${calcProgress(plan)}%;"></div></div>`;
    const container = document.getElementById('daysContainer'); container.innerHTML = '';
    plan.days.forEach((day, di) => {
      const card = document.createElement('div'); card.className = 'card day-card';
      card.innerHTML = buildDayHTML(day, di);
      container.appendChild(card);
      card.querySelector('.day-weight').onchange = e => updateDailyWeight(di, e.target.value);
      card.querySelector('.water-input').onchange = e => updateWater(di, e.target.value);
      card.querySelectorAll('.macro-input').forEach(inp => inp.oninput = () => updateMacroLive(di));
      card.querySelectorAll('.exercise-input').forEach(inp => inp.onchange = () => saveCurrentWeek());
    });
    updateAllMacroLive();
  }
  function buildDayHTML(day, di) {

    return `

        <span>${day.meals.filter(m=>m.completed).length}/${day.meals.length} meals · ${exerciseCount(day)} ex</span>
        <input class="input day-weight" type="number" value="${day.dailyWeight||''}" placeholder="lbs" style="width:70px;">
        <input class="input water-input" type="number" value="${day.waterOz||''}" placeholder="oz" style="width:60px;">
      </div>
      <div class="day-body" style="display:${allExpanded?'block':'none'};">
        ${renderMeals(day, di)}
        ${renderWorkouts(day, di)}
        <textarea class="input day-notes" placeholder="Day notes" style="height:40px;" onchange="updateDayNotes(${di}, this.value)">${day.notes||''}</textarea>
      </div>`;
  }

            <input class="input macro-input" type="number" placeholder="C" value="${m.carbs||''}" data-day="${di}" data-index="${mi}" data-field="carbs" style="width:45px; padding:4px;">

    });
    html += `<div class="macro-live" id="macroLive${di}">🔥 ${macros.cal} kcal | 🥩 ${macros.protein}g | 🌾 ${macros.carbs}g | 🥑 ${macros.fat}g</div>`;
    return html;
  }
  function renderWorkouts(day, di) {
    if (!day.workoutBlocks.length) return '';
    let html = `<div class="section-title" style="font-weight:700; color:var(--blue); margin-top:10px;">🏋️ Workout</div>`;

            <div class="exercise-row">
              <div class="exercise-header">
                <div class="check-circle ${ex.completed?'done':''}" onclick="event.stopPropagation(); toggleExercise(${di},${bi},${ei})"></div>
                <span>${ex.name} <small>${ex.prescribedSetsReps || ''}</small> ${ex.prescribedWeight ? `<small style="color:var(--orange)">${ex.prescribedWeight}</small>` : ''}</span>
                ${ex.workSec && !block.isCircuit ? `<span class="timer-display" id="exTimer-${ex.id}">${formatSeconds(ex.workSec)}</span><button class="timer-big" id="exStart-${ex.id}" onclick="startExTimer('${ex.id}', this)">▶</button>` : ''}
                ${block.isCircuit ? `<span class="timer-display" id="circuitExTimer-${di}-${bi}-${ei}">${ex.workSec}s</span>` : ''}
              </div>
              <div style="display:flex; gap:4px; margin-left:34px; margin-top:4px;">
                <input class="input exercise-input" type="number" placeholder="Sets" value="${ex.sets||''}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="sets" style="width:60px;">
                <input class="input exercise-input" type="text" placeholder="Weight" value="${ex.weight}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="weight" style="width:70px;">
                <input class="input exercise-input" type="text" placeholder="Reps" value="${ex.reps}" data-day="${di}" data-block="${bi}" data-index="${ei}" data-field="reps" style="width:60px;">
                <input class="input exercise-input" type="number" min="1" max="10" value="${ex.rpe||'5'}" data-field="rpe" data-day="${di}" data-block="${bi}" data-index="${ei}" style="width:50px; color:${rpeColor(ex.rpe||5)};">
              </div>
            </div>`;
        });
        if (block.isCircuit) {
          html += `<div style="display:flex; justify-content:center; margin-top:8px; gap:10px;">
            <button class="timer-big" id="circuitStart-${di}-${bi}" onclick="startCircuitTimer(${di},${bi}, this)">▶ Start Circuit</button>
            <span class="timer-display" id="circuitOverall-${di}-${bi}">${block.time ? formatMinutes(parseTimeToSecs(block.time)) : '--:--'}</span>
          </div>`;
        }
        html += `</div>`;
      }
    });
    return html;
  }

  // ---------- STATE UPDATES ----------
  function toggleMeal(di, mi) { const w = getCurrentWeek(); w.plan.days[di].meals[mi].completed = !w.plan.days[di].meals[mi].completed; saveCurrentWeek(); renderTracker(); }
  function toggleExercise(di, bi, ei) { const w = getCurrentWeek(); w.plan.days[di].workoutBlocks[bi].exercises[ei].completed = !w.plan.days[di].workoutBlocks[bi].exercises[ei].completed; saveCurrentWeek(); renderTracker(); }
  function updateDailyWeight(di, val) { const w=getCurrentWeek(); if(w){ w.plan.days[di].dailyWeight = val ? +val : null; saveCurrentWeek(); renderHome(); } }
  function updateWater(di, val) { const w=getCurrentWeek(); if(w){ w.plan.days[di].waterOz = val; saveCurrentWeek(); } }
  function updateDayNotes(di, val) { const w=getCurrentWeek(); if(w){ w.plan.days[di].notes = val; saveCurrentWeek(); } }
  function updateClassIntensity(di, bi, val) {
    const w = getCurrentWeek(); if(w) w.plan.days[di].workoutBlocks[bi].intensity = +val;
    document.getElementById(`classIntensityLabel-${di}-${bi}`).textContent = val + '%';
    document.getElementById(`classIntensityBar-${di}-${bi}`).style.width = val + '%';
    saveCurrentWeek();
  }
  function macroQuickAdd(di, mi, field, amount) {
    const w = getCurrentWeek();
    const meal = w.plan.days[di].meals[mi];
    const cur = parseFloat(meal[field]) || 0;
    meal[field] = (cur + amount).toFixed(0);
    saveCurrentWeek();
    updateMacroLive(di);
  }
  function updateMacroLive(di) {
    const day = getCurrentPlan().days[di];
    const macros = calcDayMacros(day);
    const el = document.getElementById(`macroLive${di}`);
    if (el) el.innerHTML = `🔥 ${macros.cal} kcal | 🥩 ${macros.protein}g | 🌾 ${macros.carbs}g | 🥑 ${macros.fat}g`;
  }
  function updateAllMacroLive() { const p=getCurrentPlan(); if(p) p.days.forEach((_,i) => updateMacroLive(i)); }

  // ---------- TIMERS ----------
  function startClassTimer(di, bi) {
    const block = getCurrentPlan().days[di].workoutBlocks[bi];
    const duration = parseInt(block.duration);
    if (!duration) return;
    const key = `class-${di}-${bi}`;
    const btn = document.getElementById(`classStart-${di}-${bi}`);
    if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; return; }
    let remaining = duration * 60;
    const display = document.getElementById(`classTimer-${di}-${bi}`);
    btn.innerHTML = '⏸ Pause';
    activeTimers[key] = { id: setInterval(() => {
      remaining--;
      display.textContent = formatSeconds(remaining);
      if (remaining <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; playBeep(800,0.3); }
    }, 1000) };
  }
  function startExTimer(exId, btn) {
    const exercise = findExercise(exId);
    if (!exercise || !exercise.workSec) return;
    const key = `ex-${exId}`;
    if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶'; return; }
    let remaining = exercise.workSec;
    const display = document.getElementById(`exTimer-${exId}`);
    btn.innerHTML = '⏸';
    activeTimers[key] = { id: setInterval(() => {
      remaining--;
      if (display) display.textContent = formatSeconds(remaining);
      if (remaining <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶'; playBeep(800,0.15); }
    }, 1000) };
  }
  function findExercise(id) { for (let d of getCurrentPlan().days) for (let b of d.workoutBlocks) for (let e of b.exercises) if(e.id===id) return e; }
  function startCircuitTimer(di, bi, btn) {
    const block = getCurrentPlan().days[di].workoutBlocks[bi];
    const key = `circuit-${di}-${bi}`;
    if (activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; return; }
    let total = parseTimeToSecs(block.time) || 99999, station=0, inWork=true, left=block.exercises[0].workSec;
    btn.innerHTML = '⏸ Pause';
    activeTimers[key] = { id: setInterval(() => {
      total--; left--;
      document.getElementById(`circuitOverall-${di}-${bi}`).textContent = formatSeconds(total);
      const exDisplay = document.getElementById(`circuitExTimer-${di}-${bi}-${station}`);
      if (exDisplay) exDisplay.textContent = inWork ? `Work ${formatSeconds(left)}` : `Rest ${formatSeconds(left)}`;
      if (left <= 0) {
        if (inWork) { inWork = false; left = block.exercises[station].restSec || 0; }
        else { inWork = true; station = (station+1)%block.exercises.length; left = block.exercises[station].workSec; }
      }
      if (total <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; btn.innerHTML = '▶ Start'; playBeep(800,0.3); }
    }, 1000) };
  }
  function playBeep(f=800,d=0.15) { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(),g=ctx.createGain(); o.type='square'; o.frequency.value=f; g.gain.value=0.3; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+d); }

  function toggleAllDays() { allExpanded = !allExpanded; renderTracker(); }
  function goToToday() {
    const todayIdx = (new Date().getDay() + 6) % 7;
    const today = daysOrder[todayIdx];
    const headers = document.querySelectorAll('.day-header b');
    for (let h of headers) if (h.textContent === today) { h.closest('.card').scrollIntoView({behavior:'smooth'}); break; }
  }

  // ---------- NAVIGATION ----------
  function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'Page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (activeNav) activeNav.classList.add('active');
    if (page === 'home') renderHome();
    if (page === 'tracker') renderTracker();
    if (page === 'history') renderHistory();
    if (page === 'settings') renderSettings();
  }

  // ---------- HOME & CHART (4 lines) ----------
  function renderHome() {
    const week = getCurrentWeek();
    document.getElementById('overviewCard').innerHTML = week ? `
      <h3>Current Week</h3>
      <div>Started: ${new Date(week.startDate).toLocaleDateString()}</div>
      <div>Progress: ${calcProgress(week.plan)}%</div>
    ` : '<h3>No data loaded</h3><p>Import your first plan!</p>';
    drawWeightChart();
  }

  function drawWeightChart() {
    const ctx = document.getElementById('homeChart').getContext('2d');
    // Gather daily weight entries (home scale)
    const dailyPoints = [];
    weekHistory.forEach(w => {
      const baseDate = new Date(w.startDate);
      w.plan.days.forEach((d, i) => {
        if (d.dailyWeight) {
          const date = new Date(baseDate);
          date.setDate(date.getDate() + i);
          dailyPoints.push({ x: date.toISOString().split('T')[0], y: d.dailyWeight });
        }
      });
    });
    // Gather scan data
    getScans().then(scans => {
      const scanData = scans
        .filter(s => s.scanDate && (s.weight != null || s.muscleMass != null || s.bodyFat != null))
        .sort((a, b) => new Date(a.scanDate) - new Date(b.scanDate));
      const labelsSet = new Set();
      dailyPoints.forEach(p => labelsSet.add(p.x));
      scanData.forEach(s => labelsSet.add(s.scanDate));
      const labels = Array.from(labelsSet).sort();
      
      const homeWeights = labels.map(label => {
        const dp = dailyPoints.find(p => p.x === label);
        return dp ? dp.y : null;
      });
      const scanWeights = labels.map(label => {
        const s = scanData.find(s => s.scanDate === label);
        return s && s.weight != null ? s.weight : null;
      });
      const muscleMasses = labels.map(label => {
        const s = scanData.find(s => s.scanDate === label);
        return s && s.muscleMass != null ? s.muscleMass : null;
      });
      const bodyFats = labels.map(label => {
        const s = scanData.find(s => s.scanDate === label);
        return s && s.bodyFat != null ? s.bodyFat : null;
      });

      if (currentChart) currentChart.destroy();
      currentChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Home Weight (lbs)', data: homeWeights, borderColor: '#ff9f0a', backgroundColor: 'rgba(255,159,10,0.1)', tension: 0.3, spanGaps: true },
            { label: 'Scan Weight (lbs)', data: scanWeights, borderColor: '#0a84ff', tension: 0.3 },
            { label: 'Muscle Mass (lbs)', data: muscleMasses, borderColor: '#30d158', tension: 0.3 },
            { label: 'Body Fat %', data: bodyFats, borderColor: '#ff453a', tension: 0.3, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } },
          scales: {
            y: { type: 'linear', position: 'left', title: { display: true, text: 'Weight / Muscle (lbs)' } },
            y1: { type: 'linear', position: 'right', title: { display: true, text: 'Body Fat %' }, grid: { drawOnChartArea: false } }
          }
        }
      });
    });
  }

  // ---------- AI (unchanged) ----------
  async function callDeepSeekAPI(messages) {
    if (!deepseekKey) { toast('Enter your DeepSeek API key in Settings'); return null; }
    try {
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${deepseekKey}`},
        body:JSON.stringify({ model:'deepseek-chat', messages, temperature:0.8 })
      });
      const data = await res.json();
      return data.choices?.[0]?.message?.content;
    } catch(e) { toast('API error'); return null; }
  }
  // ... (same chat functions, etc.)

  // ---------- ANALYZE SCAN (with date extraction) ----------
  async function analyzeLastScan() {
    const scans = await getScans();
    if (!scans.length) return toast('No scans');
    const lastScan = scans[scans.length - 1];
    currentScanId = lastScan.id;
    toast('Analyzing...');
    try {
      if (!tesseractWorker) tesseractWorker = await Tesseract.createWorker('eng');
      const { data: { text } } = await tesseractWorker.recognize(lastScan.image);
      const weightMatch = text.match(/(?:Weight|Total Body Weight)\s*[:\s]*(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i) || text.match(/(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i);
      const muscleMatch = text.match(/(?:Skeletal Muscle Mass|Muscle Mass|Lean Body Mass)\s*[:\s]*(\d+(?:\.\d+)?)\s*(?:lbs?|pounds?)/i);
      const fatMatch = text.match(/(?:Body Fat|Percent Body Fat|Fat %)\s*[:\s]*(\d+(?:\.\d+)?)\s*%/i);
      // Date extraction: common formats
      const dateMatch = text.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})|(\d{4}-\d{2}-\d{2})|(\d{1,2}\.\d{1,2}\.\d{2,4})/);
      let detectedDate = '';
      if (dateMatch) {
        const raw = dateMatch[0];
        // try to parse
        const d = new Date(raw);
        if (!isNaN(d)) {
          detectedDate = d.toISOString().split('T')[0];
        }
      }
      document.getElementById('scanWeightInput').value = weightMatch ? weightMatch[1] : '';
      document.getElementById('scanMuscleInput').value = muscleMatch ? muscleMatch[1] : '';
      document.getElementById('scanFatInput').value = fatMatch ? fatMatch[1] : '';
      document.getElementById('scanDateInput').value = detectedDate || new Date().toISOString().split('T')[0];
      document.getElementById('scanDataContent').innerHTML = `<p>Extracted values from scan. Verify and set the correct date.</p><pre style="font-size:12px; max-height:100px; overflow:auto;">${text}</pre>`;
      document.getElementById('scanDataModal').style.display = 'flex';
    } catch(e) { toast('OCR failed. Please try again.'); }
  }

  window.saveScanData = async function() {
    const scanDate = document.getElementById('scanDateInput').value;
    const weight = parseFloat(document.getElementById('scanWeightInput').value);
    const muscleMass = parseFloat(document.getElementById('scanMuscleInput').value);
    const bodyFat = parseFloat(document.getElementById('scanFatInput').value);
    if (!scanDate || (isNaN(weight) && isNaN(muscleMass) && isNaN(bodyFat))) {
      return toast('Please enter at least one value and a date.');
    }
    await updateScan(currentScanId, {
      scanDate,
      weight: isNaN(weight) ? null : weight,
      muscleMass: isNaN(muscleMass) ? null : muscleMass,
      bodyFat: isNaN(bodyFat) ? null : bodyFat
    });
    document.getElementById('scanDataModal').style.display = 'none';
    toast('Scan data saved!');
    renderHome();
    renderScans();
  };

  // ---------- PDF EXPORT (with daily weights and scan data) ----------
  function exportPDF() {
    const plan = getCurrentPlan();
    if (!plan) return toast('No plan data');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    doc.setFontSize(16);
    doc.text('Weekly Summary', 20, y);
    y += 10;
    doc.setFontSize(11);
    // Weekly plan
    plan.days.forEach(day => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFont(undefined, 'bold');
      doc.text(`=== ${day.day} ===`, 20, y);
      y += 6;
      doc.setFont(undefined, 'normal');
      day.meals.forEach(m => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(`${m.completed ? '[x]' : '[ ]'} ${m.name} (P:${m.protein||0} C:${m.carbs||0} F:${m.fat||0})`, 25, y);
        y += 6;
      });
      (day.workoutBlocks||[]).forEach(b => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(`${b.name} ${b.time ? '('+b.time+')' : ''}`, 25, y);
        y += 6;
        b.exercises.forEach(e => {
          if (y > 270) { doc.addPage(); y = 20; }
          let line = `${e.completed ? '[x]' : '[ ]'} ${e.name} (${e.prescribedSetsReps||''})`;
          if (e.weight) line += ` W:${e.weight}`;
          if (e.reps) line += ` R:${e.reps}`;
          if (e.rpe) line += ` RPE:${e.rpe}`;
          doc.text(line, 30, y);
          y += 6;
        });
      });
      y += 4;
    });
    // Home scale daily weights
    if (y > 240) { doc.addPage(); y = 20; }
    doc.setFontSize(13);
    doc.setFont(undefined, 'bold');
    doc.text('Daily Home Scale Weights', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text('Date', 20, y);
    doc.text('Weight (lbs)', 55, y);
    y += 6;
    weekHistory.forEach(w => {
      const base = new Date(w.startDate);
      w.plan.days.forEach((d, i) => {
        if (d.dailyWeight) {
          const date = new Date(base);
          date.setDate(date.getDate() + i);
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(date.toLocaleDateString(), 20, y);
          doc.text(String(d.dailyWeight), 55, y);
          y += 6;
        }
      });
    });
    // Scan data
    getScans().then(scans => {
      const filtered = scans.filter(s => s.scanDate && (s.weight != null || s.muscleMass != null || s.bodyFat != null))
        .sort((a,b) => new Date(a.scanDate) - new Date(b.scanDate));
      if (filtered.length > 0) {
        if (y > 240) { doc.addPage(); y = 20; }
        doc.setFontSize(13);
        doc.setFont(undefined, 'bold');
        doc.text('Body Composition Scans', 20, y);
        y += 8;
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.text('Date', 20, y);
        doc.text('Weight (lbs)', 55, y);
        doc.text('Muscle Mass (lbs)', 95, y);
        doc.text('Body Fat %', 145, y);
        y += 6;
        filtered.forEach(s => {
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(new Date(s.scanDate).toLocaleDateString(), 20, y);
          doc.text(s.weight != null ? String(s.weight) : '-', 55, y);
          doc.text(s.muscleMass != null ? String(s.muscleMass) : '-', 95, y);
          doc.text(s.bodyFat != null ? String(s.bodyFat) : '-', 145, y);
          y += 6;
        });
      }
      doc.save('weekly-summary.pdf');
      toast('PDF downloaded with scan & home weight data');
    });
  }

  // ---------- REMAINING FUNCTIONS (settings, history, templates, AI, etc.) are identical ----------
  // All global exposures are at the end.
  // (The full file contains them; for brevity they are omitted here.)

  window.addEventListener('DOMContentLoaded', async () => {
    await openDB();
    loadHistory();
    if (weekHistory.length && currentWeekIndex >= 0) navigateTo('tracker');
    else navigateTo('home');
    renderHome();
    document.body.style.colorScheme = darkMode ? 'dark' : 'light';
  });
})();
</script>
