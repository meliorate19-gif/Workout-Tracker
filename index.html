<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <title>Fitness Tracker</title>
  <style>
    :root { --bg: #0f0f0f; --card: #1c1c1e; --text: #fff; --sub: #8e8e93; --accent: #30d158; --blue: #0a84ff; --red: #ff453a; --orange: #ff9f0a; --border: #2c2c2e; --radius: 20px; }
    @media (prefers-color-scheme: light) { body { --bg: #fff; --card: #f2f2f7; --text: #1c1c1e; --sub: #6e6e73; --border: #e5e5ea; } }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0 0 100px; min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; }
    .app { max-width:600px; margin:0 auto; padding:16px; }
    h1 { font-size:28px; font-weight:800; text-align:center; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); display:flex; justify-content:space-around; align-items:center; height:70px; padding-bottom:env(safe-area-inset-bottom,10px); border-top:1px solid var(--border); z-index:10; }
    .nav-item { flex:1; text-align:center; font-size:11px; color:var(--sub); cursor:pointer; display:flex; flex-direction:column; align-items:center; }
    .nav-item.active { color:var(--blue); }
    .card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
    .btn { padding:14px 20px; border-radius:14px; border:none; font-size:16px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; background:var(--border); color:var(--text); }
    .btn-primary { background:var(--blue); color:#fff; width:100%; justify-content:center; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--blue); }
    .btn-sm { padding:8px 16px; font-size:14px; }
    .btn-accent { background:var(--accent); color:#000; }
    .input, textarea, select { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px; }
    .progress-bar { height:8px; background:var(--border); border-radius:4px; margin:8px 0; }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; }
    .toast { position:fixed; bottom:85px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:10px 24px; border-radius:20px; font-weight:600; opacity:0; transition:0.2s; z-index:20; }
    .toast.show { opacity:1; }
    .page { display:none; }
    .page.active { display:block; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:30; }
    .modal-box { background:var(--card); border-radius:24px; padding:24px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; }
    .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .home-tile { background:var(--card); border-radius:16px; padding:20px; text-align:center; cursor:pointer; }
    .meal-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
    .check-circle { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); margin-right:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .check-circle.done { background:var(--accent); border-color:var(--accent); }
    .check-circle.done::after { content:'✓'; color:#000; font-weight:bold; font-size:14px; }
    .macro-chips { display:flex; gap:4px; margin-left:10px; flex-wrap:wrap; align-items:center; }
    .macro-quick { background:var(--border); border:none; padding:4px 8px; border-radius:12px; font-size:12px; cursor:pointer; color:var(--text); }
    .exercise-row { padding:12px 0; border-bottom:1px solid var(--border); }
    .exercise-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
    .timer-big { background:var(--border); border:none; color:var(--text); padding:8px 16px; border-radius:12px; font-size:16px; display:flex; align-items:center; gap:8px; cursor:pointer; }
    .timer-display { font-variant-numeric:tabular-nums; font-size:20px; font-weight:700; min-width:60px; }
    .class-block { background:var(--bg); border-radius:12px; padding:12px; margin:8px 0; }
    .intensity-bar { width:100%; height:8px; background:var(--border); border-radius:4px; margin:6px 0; }
    .intensity-fill { height:100%; border-radius:4px; background:var(--orange); }
    .macro-live { margin-left:34px; margin-top:4px; font-size:13px; color:var(--sub); }
  </style>
</head>
<body>
<div class="app">
  <div class="toast" id="toast"></div>

  <!-- Home Page -->
  <div id="homePage" class="page active">
    <h1>🏠 Dashboard</h1>
    <div class="card" id="overviewCard"></div>
    <div class="card"><h3>📈 Weight Trend</h3><canvas id="homeChart" height="200"></canvas></div>
    <div class="home-grid">
      <div class="home-tile" onclick="navigateTo('input')">📋<br>Import Plan</div>
      <div class="home-tile" onclick="document.getElementById('chatHistoryFileInputHome').click()">💬<br>Load Chat</div>
      <input type="file" accept=".txt" id="chatHistoryFileInputHome" style="display:none;" onchange="importChatFromHome(this.files[0])">
      <div class="home-tile" onclick="navigateTo('coach')">🧠<br>Coach</div>
      <div class="home-tile" onclick="navigateTo('settings')">⚙️<br>Settings</div>
    </div>
  </div>

  <!-- Input Page -->
  <div id="inputPage" class="page">
    <button class="btn btn-outline btn-sm" onclick="navigateTo('home')">← Home</button>
    <div style="display:flex; gap:2px; background:var(--card); border-radius:12px; padding:4px; margin:16px 0;">
      <button class="btn tab-btn active" id="pasteTabBtn">📋 Paste</button>
      <button class="btn tab-btn" id="linkTabBtn">🔗 Link</button>
    </div>
    <div class="card">
      <div id="pasteDiv"><textarea class="input" id="planText" rows="8" placeholder="Paste your plan (any format)"></textarea><button class="btn btn-primary" onclick="loadFromPaste()">✨ Parse & Load</button></div>
      <div id="linkDiv" style="display:none;"><input class="input" id="docLink" placeholder="Google Doc link"><button class="btn btn-primary" onclick="loadFromLink()">🔍 Fetch & Parse</button></div>
    </div>
  </div>

  <!-- Tracker Page -->
  <div id="trackerPage" class="page">
    <div id="weekProgressCard" class="card"></div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
      <button class="btn btn-outline btn-sm" onclick="exportPDF()">📄 PDF</button>
      <button class="btn btn-outline btn-sm" onclick="copyToClipboard()">📋 Copy</button>
      <button class="btn btn-outline btn-sm" onclick="toggleAllDays()">📅 Expand/Collapse</button>
      <button class="btn btn-outline btn-sm" onclick="goToToday()">📍 Today</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('newWeekModal').style.display='flex'">🗑 New Week</button>
    </div>
    <div id="daysContainer"></div>
  </div>

  <!-- Coach Page -->
  <div id="coachPage" class="page">
    <div class="card">
      <h3>🧠 AI Coach (Free)</h3>
      <div id="chatMessages" style="height:200px; background:var(--bg); border-radius:12px; margin:10px 0; overflow-y:auto; padding:10px;"></div>
      <div style="display:flex; gap:6px;"><input class="input" id="chatInput" placeholder="Ask..."><button class="btn btn-primary" style="width:auto;" onclick="sendChat()">📨</button></div>
      <div style="display:flex; gap:6px; margin-top:10px;">
        <button class="btn btn-outline btn-sm" onclick="aiWeeklyReport()">📊 Report</button>
        <button class="btn btn-outline btn-sm" onclick="aiShoppingList()">🛒 Grocery</button>
        <button class="btn btn-accent btn-sm" onclick="aiSmartProgression()">🤖 Next Week</button>
      </div>
    </div>
  </div>

  <!-- History Page -->
  <div id="historyPage" class="page">
    <div class="card"><h3>📚 Past Weeks</h3><div id="historyList"></div><hr style="border-color:var(--border); margin:16px 0;"><h4>🗂 Templates</h4><div id="templateList"></div><button class="btn btn-outline btn-sm" onclick="saveTemplate()">💾 Save Current</button></div>
  </div>

  <!-- Settings Page -->
  <div id="settingsPage" class="page">
    <div class="card">
      <h3>⚙️ Settings</h3>
      <label>AI Mode <select class="input" id="aiModeSelect"><option value="web">Web (Free)</option><option value="api">API Key</option></select></label>
      <div id="apiKeySection" style="display:none;"><label>Key <input class="input" type="password" id="apiKeyInput"></label><button class="btn btn-primary btn-sm" onclick="saveApiKey()">Save</button></div>
      <hr style="border-color:var(--border); margin:16px 0;">
      <h4>📸 Body Scans</h4>
      <div id="scansContainer"></div>
      <input type="file" accept="image/*" multiple id="scanFileInput" style="display:none;" onchange="handleScanUpload(this.files)">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('scanFileInput').click()">➕ Add Scans</button>
      <button class="btn btn-outline btn-sm" onclick="analyzeLastScan()">🔬 Analyze Latest</button>
      <hr style="border-color:var(--border); margin:16px 0;">
      <button class="btn btn-outline" onclick="showHelp()">❓ Help</button>
      <button class="btn btn-outline" onclick="toggleTheme()">🌓 Theme</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="home" onclick="navigateTo('home')">🏠 Home</div>
  <div class="nav-item" data-page="tracker" onclick="navigateTo('tracker')">📋 Tracker</div>
  <div class="nav-item" data-page="coach" onclick="navigateTo('coach')">🧠 Coach</div>
  <div class="nav-item" data-page="history" onclick="navigateTo('history')">📚 History</div>
  <div class="nav-item" data-page="settings" onclick="navigateTo('settings')">⚙️ Settings</div>
</div>

<!-- Modals -->
<div id="newWeekModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>New Week</h3>
    <button class="btn btn-primary" onclick="newWeekPaste()">📋 Paste text</button>
    <button class="btn btn-outline" onclick="newWeekLink()" style="margin-top:8px;">🔗 Google Doc link</button>
    <button class="btn btn-outline" onclick="autoGenNextWeek()" style="margin-top:8px;">🤖 Auto (+5 lbs)</button>
    <button class="btn btn-accent" onclick="aiSmartProgression()" style="margin-top:8px;">🧠 AI Smart Progression</button>
    <button class="btn btn-outline" onclick="document.getElementById('newWeekModal').style.display='none'" style="margin-top:8px; width:100%;">Cancel</button>
  </div>
</div>
<div id="helpModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div id="helpSlides"></div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn btn-outline" onclick="document.getElementById('helpModal').style.display='none'">Skip</button>
      <button class="btn btn-primary" id="helpNextBtn" onclick="nextHelpSlide()">Next →</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(function() {
  // ----- STATE -----
  let weekHistory = [], currentWeekIndex = -1;
  const daysOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  let allExpanded = true;
  let darkMode = localStorage.getItem('darkMode') !== 'false';
  let deepseekKey = localStorage.getItem('deepseekKey') || '';
  let chatHistory = localStorage.getItem('deepseekChatHistory') || '';
  let templates = JSON.parse(localStorage.getItem('templates') || '[]');
  let aiMode = localStorage.getItem('aiMode') || 'web';
  let db;
  const DB_NAME = 'BodyScansDB', STORE_NAME = 'scans';
  let currentChart = null;
  let activeTimers = {};
  let tesseractWorker = null;
  let helpSlide = 0;
  const helpSlides = [
    {title:'Welcome!',text:'Your AI-powered fitness tracker. Log workouts, meals, and get free coaching via DeepSeek.'},
    {title:'Home',text:'Dashboard with weight trend, quick import of plans and chat history.'},
    {title:'Tracker',text:'Check off meals, fill macros, log sets/weight/reps/RPE. Timers for circuits and classes.'},
    {title:'Coach (Free)',text:'Web Chat opens DeepSeek with your data. Weekly reports, shopping lists, workout generation.'},
    {title:'Settings',text:'Switch AI mode, import chat history, manage body scans and templates.'}
  ];

  function toast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ----- INDEXEDDB -----
  async function openDB() {
    return new Promise((res,rej) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onerror = rej;
      req.onsuccess = () => { db = req.result; res(); };
      req.onupgradeneeded = () => { req.result.createObjectStore(STORE_NAME, { keyPath:'id', autoIncrement:true }); };
    });
  }
  async function addScan(img, date) {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).add({ image:img, date, notes:'' });
      tx.oncomplete = res;
    });
  }
  async function getScans() {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result);
    });
  }
  async function deleteScan(id) {
    await openDB();
    return new Promise(res => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(id);
      tx.oncomplete = res;
    });
  }

  // ----- STORAGE -----
  function saveHistory() { localStorage.setItem('weekHistory', JSON.stringify(weekHistory)); localStorage.setItem('currentWeekIndex', currentWeekIndex); }
  function loadHistory() {
    const h = localStorage.getItem('weekHistory');
    if (h) {
      weekHistory = JSON.parse(h);
      currentWeekIndex = parseInt(localStorage.getItem('currentWeekIndex')) || (weekHistory.length - 1);
      if (currentWeekIndex < 0 || currentWeekIndex >= weekHistory.length) currentWeekIndex = weekHistory.length - 1;
    } else { weekHistory = []; currentWeekIndex = -1; }
    saveHistory();
  }
  function getCurrentWeek() { return (weekHistory.length && currentWeekIndex >= 0) ? weekHistory[currentWeekIndex] : null; }
  function getCurrentPlan() { const w = getCurrentWeek(); return w ? w.plan : null; }
  function saveCurrentWeek() { if (getCurrentWeek()) { weekHistory[currentWeekIndex] = getCurrentWeek(); saveHistory(); } }

  // ----- UNIVERSAL PARSER (handles any format) -----
  function parsePlan(text) {
    // First, try to find explicit section headers (SECTION 1 / SECTION 2)
    const mealSec = text.match(/SECTION\s*1\s*:?\s*MEAL\s*PLAN/i);
    const workSec = text.match(/SECTION\s*2\s*:?\s*(WEEKLY\s*)?WORKOUT\s*SCHEDULE/i);
    if (mealSec && workSec) {
      // structured format
      return parseStructured(text, mealSec.index, workSec.index);
    } else {
      // unstructured: look for day headers anywhere
      return parseFreeform(text);
    }
  }

  function parseStructured(text, mealStart, workStart) {
    const dayMap = {};
    daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const mealText = text.substring(mealStart, workStart);
    const workoutText = text.substring(workStart);

    // Meals
    let curMealDay = null;
    mealText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) { curMealDay = dayMatch; return; }
      if (curMealDay && /^[·•\-*]\s/.test(line)) {
        let content = line.replace(/^[·•\-*]\s*/, '').trim();
        const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
        let time='', desc=content;
        if (timeMatch) { time=timeMatch[1].trim(); desc=timeMatch[2].trim(); }
        desc = desc.replace(/\s*~\s*\d+.*$/,'').trim();
        if (desc) dayMap[curMealDay].meals.push({
          id: crypto.randomUUID(), name:desc, time, completed:false,
          ateNotes:'', protein:'', carbs:'', fat:''
        });
      }
    });

    // Workouts (same as before)
    parseWorkoutLines(workoutText, dayMap);
    return buildDays(dayMap);
  }

  function parseFreeform(text) {
    const dayMap = {};
    daysOrder.forEach(d => dayMap[d] = { day:d, meals:[], workoutBlocks:[], dailyWeight:null, waterOz:'' });
    const lines = text.split('\n');
    let currentDay = null;
    let afterMeals = false; // simple heuristic: after seeing a line with "workout" we'll treat subsequent lines as workouts

    for (let line of lines) {
      line = line.trim();
      if (!line) continue;

      // Detect day header (e.g., "MONDAY", "monday", "Monday - ...")
      const dayMatch = daysOrder.find(d => {
        const up = line.toUpperCase();
        return up.startsWith(d.toUpperCase()) && (line.length === d.length || /[^a-zA-Z0-9]/.test(line[d.length]));
      });
      if (dayMatch) {
        currentDay = dayMatch;
        afterMeals = false; // reset
        continue;
      }

      if (!currentDay) continue; // skip until we hit a day

      // Skip the day's subtitle like "Randori (Moderate Carb)" etc.
      if (/^\s*\(.*\)\s*$/.test(line)) continue;

      // Check if line looks like workout heading
      if (/workout|training|circuit|exercise|density block|class/i.test(line)) {
        afterMeals = true;
        continue;
      }

      // Bullet line (starts with ·, •, -, *)
      if (/^[·•\-*]\s/.test(line)) {
        const content = line.replace(/^[·•\-*]\s*/, '').trim();

        if (afterMeals) {
          // treat as exercise
          addExerciseFromLine(dayMap[currentDay], content);
        } else {
          // could be meal or workout, try to detect meal pattern : time in parentheses
          const timeMatch = content.match(/^.*?\(([^)]+)\)\s*:\s*(.*)/);
          if (timeMatch) {
            // meal with time
            const time = timeMatch[1].trim();
            let desc = timeMatch[2].trim();
            desc = desc.replace(/\s*~\s*\d+.*$/,'').trim();
            if (desc) dayMap[currentDay].meals.push({
              id: crypto.randomUUID(), name:desc, time, completed:false,
              ateNotes:'', protein:'', carbs:'', fat:''
            });
          } else {
            // no time: could still be a meal if it doesn't contain sets/reps
            if (!/\d+\s*x\s*\d+/.test(content) && !/\d+\s*(sec|min|yds)/.test(content)) {
              // assume meal
              dayMap[currentDay].meals.push({
                id: crypto.randomUUID(), name:content, time:'', completed:false,
                ateNotes:'', protein:'', carbs:'', fat:''
              });
            } else {
              addExerciseFromLine(dayMap[currentDay], content);
            }
          }
        }
      } else {
        // Non-bullet lines: could be exercise without bullet, or part/circuit header
        const partMatch = line.match(/^Part\s*(\d+)\s*:\s*(.*)/i);
        const circuitMatch = line.match(/^Format\s*:\s*(.*)/i);
        if (partMatch || circuitMatch) {
          startNewBlock(dayMap[currentDay], partMatch ? `Part ${partMatch[1]}: ${partMatch[2]}` : circuitMatch[1], !!circuitMatch);
          afterMeals = true;
          continue;
        }
        // Class block
        const classMatch = line.match(/^·\s*Class\s*:\s*(.*)/i) || line.match(/^Class\s*:\s*(.*)/i);
        if (classMatch) {
          addClassBlock(dayMap[currentDay], classMatch[1]);
          afterMeals = true;
          continue;
        }
        // If afterMeals is true, attempt to parse as exercise
        if (afterMeals && line.length > 3) {
          addExerciseFromLine(dayMap[currentDay], line);
        }
      }
    }
    return buildDays(dayMap);
  }

  function parseWorkoutLines(workoutText, dayMap) {
    let curWorkDay = null, curBlock = null;
    workoutText.split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const dayMatch = daysOrder.find(d => line.toUpperCase().startsWith(d.toUpperCase()) && /[^a-zA-Z]/.test(line[d.length]));
      if (dayMatch) {
        if (curBlock && (curBlock.exercises.length || curBlock.type === 'class')) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        curWorkDay = dayMatch; curBlock = null; return;
      }
      if (!curWorkDay) return;

      const classMatch = line.match(/^·\s*Class\s*:\s*(.*)/i);
      if (classMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        curBlock = { type:'class', name:'Judo / Class', duration:'', intensity:50, notes:'' };
        const times = classMatch[1].match(/(\d{1,2}:\d{2}\s*[APMapm]*)\s*[-–—]\s*(\d{1,2}:\d{2}\s*[APMapm]*)/);
        if (times) {
          const start = new Date(`2025-01-01 ${times[1]}`);
          const end = new Date(`2025-01-01 ${times[2]}`);
          const mins = (end - start) / 60000;
          if (mins > 0) curBlock.duration = String(mins);
        }
        return;
      }
      if (/^·\s*Notes/i.test(line)) return;

      const partMatch = line.match(/^Part\s*(\d+)\s*:\s*(.*)/);
      const circuitMatch = line.match(/^Format\s*:\s*(.*)/);
      if (partMatch || circuitMatch) {
        if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
        curBlock = {
          name: partMatch ? `Part ${partMatch[1]}: ${partMatch[2]}` : circuitMatch[1],
          time:'', exercises:[], isCircuit: !!circuitMatch, type:'workout'
        };
        if (circuitMatch) {
          const t = circuitMatch[1].match(/(\d+)\s*-\s*min/);
          if (t) curBlock.time = t[1] + ' min';
        }
        return;
      }
      if (!curBlock) curBlock = { name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' };
      if (/^(Post-Workout|Pre-Class|Pre-Workout|Post-Class|Step\s+Exercise)/i.test(line)) return;
      if (/Exercise\s+Sets\s+Reps/i.test(line) || /^Actual/i.test(line) || /^Weights Used/i.test(line)) return;

      addExerciseFromLineToBlock(curBlock, line);
    });
    if (curBlock) dayMap[curWorkDay].workoutBlocks.push(curBlock);
  }

  function addExerciseFromLine(dayObj, line) {
    // Add to the latest block (or create one)
    if (!dayObj.workoutBlocks.length || dayObj.workoutBlocks[dayObj.workoutBlocks.length-1].type !== 'workout') {
      dayObj.workoutBlocks.push({ name:'Main Workout', time:'', exercises:[], isCircuit:false, type:'workout' });
    }
    const block = dayObj.workoutBlocks[dayObj.workoutBlocks.length-1];
    addExerciseFromLineToBlock(block, line);
  }

  function addClassBlock(dayObj, classString) {
    const block = { type:'class', name:'Judo / Class', duration:'', intensity:50, notes:'' };
    const times = classString.match(/(\d{1,2}:\d{2}\s*[APMapm]*)\s*[-–—]\s*(\d{1,2}:\d{2}\s*[APMapm]*)/);
    if (times) {
      const start = new Date(`2025-01-01 ${times[1]}`);
      const end = new Date(`2025-01-01 ${times[2]}`);
      const mins = (end - start) / 60000;
      if (mins > 0) block.duration = String(mins);
    }
    dayObj.workoutBlocks.push(block);
  }

  function startNewBlock(dayObj, name, isCircuit) {
    dayObj.workoutBlocks.push({
      name, time:'', exercises:[], isCircuit, type:'workout'
    });
  }

  function addExerciseFromLineToBlock(block, line) {
    let exName=null, prescribed='', workSec=0, restSec=0, prescribedWeight='', sets='';
    const stationMatch = line.match(/^(.+?)\s+(\d+)\s*sec\s+(\d+)\s*sec/i);
    if (stationMatch && block.isCircuit) {
      exName = stationMatch[1].trim(); workSec = +stationMatch[2]; restSec = +stationMatch[3]; prescribed = `${workSec}s/${restSec}s`;
      const wM = line.match(/(\d+)\s*lbs?/i); if (wM) prescribedWeight = wM[1] + ' lbs';
    } else {
      let m = line.match(/^\d+\s+(.*?)\s+(\d+)\s*(?:min|sec)\s+(\d+-?\d*)/i);
      if (m) {
        exName = m[1].trim(); workSec = +m[2]*60; prescribed = m[3];
        const wM = line.match(/(\d+)\s*lb/i); if (wM) prescribedWeight = wM[1] + ' lbs';
      } else {
        m = line.match(/^([A-Z]):\s*(.*?)(?:\s+(\d+)\s+(\d+[\/\w]*))?\s+(\d+\s*sec)?/);
        if (m) {
          exName = m[2].trim();
          if (m[3] && m[4]) { sets = m[3]; prescribed = `${sets}x${m[4]}`; }
          if (m[5]) workSec = +m[5];
          const wM = line.match(/(\d+)\s*lb\b/i); if (wM) prescribedWeight = wM[1] + ' lbs';
        } else {
          const generic = line.match(/^(.+?)\s+(\d+)\s*x\s*(\d+)/i);
          if (generic) { exName = generic[1].trim(); sets = generic[2]; prescribed = `${sets}x${generic[3]}`; }
          else exName = line.split(/\s+/).slice(0,4).join(' ');
        }
      }
    }
    if (exName && exName.length>2) {
      block.exercises.push({
        id: crypto.randomUUID(), name: exName.charAt(0).toUpperCase()+exName.slice(1),
        prescribedSetsReps: prescribed, prescribedWeight, completed:false,
        sets: '', weight:'', reps:'', rpe:'5', workSec, restSec
      });
    }
  }

  function buildDays(dayMap) {
    return { days: daysOrder.map(d => ({ ...dayMap[d], notes:'' })).filter(d => d.meals.length || d.workoutBlocks.length) };
  }

  // ----- HELPER FUNCTIONS (same as before) -----
  function calcProgress(plan) {
    let total=0, done=0;
    plan.days.forEach(d => {
      d.meals.forEach(m => { total++; if(m.completed) done++; });
      (d.workoutBlocks||[]).forEach(b => {
        if (b.type === 'class') return;
        b.exercises.forEach(e => { total++; if(e.completed) done++; });
      });
    });
    return total ? Math.round(done/total*100) : 0;
  }
  function exerciseCount(day) {
    let total = 0;
    (day.workoutBlocks||[]).forEach(b => {
      if (b.type === 'workout') total += b.exercises.length;
      else if (b.type === 'class') total++;
    });
    return total;
  }
  function calcDayMacros(day) {
    const p = (day.meals||[]).reduce((s,m) => s + (+m.protein||0), 0);
    const c = (day.meals||[]).reduce((s,m) => s + (+m.carbs||0), 0);
    const f = (day.meals||[]).reduce((s,m) => s + (+m.fat||0), 0);
    return { protein: p.toFixed(0), carbs: c.toFixed(0), fat: f.toFixed(0), cal: (p*4 + c*4 + f*9).toFixed(0) };
  }
  function rpeColor(val) {
    if (val <= 3) return 'var(--accent)';
    if (val <= 6) return 'var(--orange)';
    return 'var(--red)';
  }
  function formatSeconds(sec) { const m = Math.floor(sec/60), s = sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }
  function formatMinutes(mins) { return formatSeconds(parseInt(mins)*60); }
  function parseTimeToSecs(str) { const mins = str.match(/(\d+)\s*min/); return mins ? +mins[1]*60 : 0; }

  // ----- TRACKER RENDER (unchanged) -----
  function renderTracker() {
    const plan = getCurrentPlan();
    if (!plan) return;
    document.getElementById('weekProgressCard').innerHTML = `<h3>Progress: ${calcProgress(plan)}%</h3><div class="progress-bar"><div class="progress-fill" style="width:${calcProgress(plan)}%;"></div></div>`;
    const container = document.getElementById('daysContainer'); container.innerHTML = '';
    plan.days.forEach((day, di) => {
      const card = document.createElement('div'); card.className = 'card day-card';
      card.innerHTML = buildDayHTML(day, di);
      container.appendChild(card);
      card.querySelector('.day-weight').onchange = e => updateDailyWeight(di, e.target.value);
      card.querySelector('.water-input').onchange = e => updateWater(di, e.target.value);
      card.querySelectorAll('.macro-input').forEach(inp => inp.oninput = () => updateMacroLive(di));
      card.querySelectorAll('.exercise-input').forEach(inp => inp.onchange = () => saveCurrentWeek());
    });
    updateAllMacroLive();
  }

  // buildDayHTML, renderMeals, renderWorkouts, state updates, timers, etc. are identical to previous version
