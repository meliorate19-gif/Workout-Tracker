<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Fitness Plan Parser</title>
  <!-- Bootstrap 5 CSS + custom styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .container { max-width: 1200px; margin-top: 2rem; }
    .card { margin-bottom: 1.5rem; border: none; box-shadow: 0 0.15rem 1rem rgba(0,0,0,0.05); }
    .section-title { font-weight: 700; font-size: 1.25rem; border-left: 4px solid #0d6efd; padding-left: 0.75rem; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .meal-day { background: #f8f9fa; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .badge-time { background: #0d6efd; color: white; font-weight: 500; }
    pre { white-space: pre-wrap; word-break: break-word; background: #212529; color: #f8f9fa; padding: 1rem; border-radius: 8px; font-size: 0.9rem; }
    .schedule-table td, .schedule-table th { white-space: nowrap; vertical-align: middle; }
    .day-col { min-width: 110px; }
    .stop-rule { background: #fff3cd; border-left: 4px solid #ffc107; padding: 0.5rem 1rem; margin-bottom: 0.5rem; border-radius: 4px; }
    .btn-parse { font-weight: 600; }
    textarea { font-family: 'Courier New', monospace; font-size: 0.9rem; }
    .nav-tabs .nav-link { font-weight: 500; }
    .tab-pane { padding-top: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="mb-4 text-center">📋 Weekly Fitness & Nutrition Plan Parser</h1>
  <p class="text-muted text-center">Paste the full plan text below to extract structured schedule, meals, workouts, and more.</p>
  
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card">
        <div class="card-body">
          <label class="form-label fw-bold">Paste your plan here</label>
          <textarea id="rawInput" class="form-control mb-3" rows="12" placeholder="Paste the entire plan text including sections like Primary Directive, Daily Schedule, Meal Plan, etc..."></textarea>
          <div class="d-flex gap-2">
            <button id="parseBtn" class="btn btn-primary btn-parse px-4">🔍 Parse Plan</button>
            <button id="clearBtn" class="btn btn-outline-secondary">Clear</button>
            <button id="exportJsonBtn" class="btn btn-outline-dark ms-auto" disabled>📥 Export JSON</button>
          </div>
          <div id="parseError" class="text-danger mt-2 small"></div>
        </div>
      </div>
      
      <!-- Results area -->
      <div id="resultsContainer" style="display:none;">
        <!-- Tabs navigation -->
        <ul class="nav nav-tabs mt-4" id="resultTabs" role="tablist">
          <li class="nav-item" role="presentation"><button class="nav-link active" id="schedule-tab" data-bs-toggle="tab" data-bs-target="#schedulePane" type="button" role="tab">📅 Daily Schedule</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" id="meals-tab" data-bs-toggle="tab" data-bs-target="#mealsPane" type="button" role="tab">🍽️ Meal Plan</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" id="workout-tab" data-bs-toggle="tab" data-bs-target="#workoutPane" type="button" role="tab">🏋️ Workouts</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" id="rehabSupps-tab" data-bs-toggle="tab" data-bs-target="#rehabSuppsPane" type="button" role="tab">🧘 Rehab & Supps</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" id="stop-tab" data-bs-toggle="tab" data-bs-target="#stopPane" type="button" role="tab">⚠️ Stop Rules</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" id="json-tab" data-bs-toggle="tab" data-bs-target="#jsonPane" type="button" role="tab">🧾 Raw JSON</button></li>
        </ul>
        
        <!-- Tab panes -->
        <div class="tab-content" id="resultTabsContent">
          <div class="tab-pane fade show active" id="schedulePane" role="tabpanel"></div>
          <div class="tab-pane fade" id="mealsPane" role="tabpanel"></div>
          <div class="tab-pane fade" id="workoutPane" role="tabpanel"></div>
          <div class="tab-pane fade" id="rehabSuppsPane" role="tabpanel"></div>
          <div class="tab-pane fade" id="stopPane" role="tabpanel"></div>
          <div class="tab-pane fade" id="jsonPane" role="tabpanel"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS + custom parser -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    // ---------- PARSER ENGINE ----------
    const DAYS_MAP = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const DAYS_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    
    function parseFullPlan(text) {
      // Remove leading/trailing quotes/whitespace
      text = text.replace(/^[“"']+/, '').replace(/[”"']+$/, '').trim();
      
      // Split into major sections by "---" lines
      const sectionsRaw = text.split(/\n---+\n/);
      let sections = [];
      for (let sec of sectionsRaw) {
        sec = sec.trim();
        if (sec) sections.push(sec);
      }
      
      // Identify sections by their first meaningful line
      let primaryDirective = {};
      let dailyScheduleText = null;
      let mealPlanText = null;
      let workoutPlanText = null;
      let dailyRehabText = null;
      let supplementText = null;
      let stopRulesText = null;
      
      for (let sec of sections) {
        const lines = sec.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) continue;
        const firstLine = lines[0].toLowerCase();
        
        if (firstLine.includes('primary directive')) {
          primaryDirective = parsePrimaryDirective(sec);
        } else if (firstLine.includes('daily schedule snapshot')) {
          dailyScheduleText = sec;
        } else if (firstLine.includes('meal plan')) {
          mealPlanText = sec;
        } else if (firstLine.includes('workout plan') || firstLine.includes('progression targets')) {
          workoutPlanText = sec;
        } else if (firstLine.includes('daily rehab')) {
          dailyRehabText = sec;
        } else if (firstLine.includes('supplement protocol')) {
          supplementText = sec;
        } else if (firstLine.includes('stop rules')) {
          stopRulesText = sec;
        } else {
          // Could be primary directive line (first section without header)
          if (firstLine.match(/^\d+,\s*\d{4}\)/)) continue; // date line
          if (firstLine.includes('primary directive')) {
            primaryDirective = parsePrimaryDirective(sec);
          }
        }
      }
      
      // Parse each section with dedicated functions
      const dailySchedule = dailyScheduleText ? parseDailySchedule(dailyScheduleText) : [];
      const mealPlan = mealPlanText ? parseMealPlan(mealPlanText) : {};
      const workouts = workoutPlanText ? parseWorkoutPlan(workoutPlanText) : {};
      const rehab = dailyRehabText ? parseRehabTable(dailyRehabText) : [];
      const supplements = supplementText ? parseSupplements(supplementText) : [];
      const stopRules = stopRulesText ? parseStopRules(stopRulesText) : [];
      
      return {
        primaryDirective,
        dailySchedule,
        mealPlan,
        workouts,
        rehab,
        supplements,
        stopRules
      };
    }
    
    // ---------- PRIMARY DIRECTIVE ----------
    function parsePrimaryDirective(text) {
      const result = {};
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      for (let line of lines) {
        if (line.toLowerCase().includes('primary directive')) {
          const parts = line.split(':').slice(1).join(':').trim();
          if (parts) result.directive = parts;
        } else if (line.includes('No BCAAs') || line.includes('No alcohol') || line.includes('No energy drinks')) {
          result.restrictions = line;
        } else if (line.includes('Black coffee') || line.includes('salted water')) {
          result.allowedDrinks = line;
        } else if (line.match(/^\d+,\s*\d{4}\)/)) {
          result.date = line.replace(/[“”"]/g, '');
        }
      }
      return result;
    }
    
    // ---------- DAILY SCHEDULE (TABLE) ----------
    function parseDailySchedule(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      // Find header row containing "Time" and day names
      let headerIndex = -1;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('Time') && (lines[i].includes('Mon') || lines[i].includes('Tue'))) {
          headerIndex = i;
          break;
        }
      }
      if (headerIndex === -1) return [];
      
      // Extract day columns from header
      const headerLine = lines[headerIndex];
      const headerTokens = headerLine.split(/\s{2,}/);
      const daysOrder = [];
      for (let tok of headerTokens) {
        const dayMatch = tok.match(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/);
        if (dayMatch) daysOrder.push(dayMatch[1]);
      }
      if (daysOrder.length === 0) return [];
      
      // Process rows after header until a line that doesn't start with time pattern
      const scheduleRows = [];
      for (let i = headerIndex+1; i < lines.length; i++) {
        const line = lines[i];
        // Time pattern like "4:00 AM" or "11:30 AM" or "12:00 PM"
        if (!/^\d{1,2}:\d{2}\s+(AM|PM)/i.test(line)) break;
        const tokens = line.split(/\s{2,}/);
        if (tokens.length < 2) continue;
        const time = tokens[0].trim();
        const activities = tokens.slice(1, 1 + daysOrder.length).map(t => t.trim() === '—' ? '' : t.trim());
        scheduleRows.push({ time, activities });
      }
      
      // Build per-day schedule
      const dailySchedule = {};
      for (let d of daysOrder) dailySchedule[d] = [];
      
      for (let row of scheduleRows) {
        const time = row.time;
        for (let idx = 0; idx < daysOrder.length; idx++) {
          const act = row.activities[idx] || '';
          if (act) {
            dailySchedule[daysOrder[idx]].push({ time, activity: act });
          }
        }
      }
      return dailySchedule;
    }
    
    // ---------- MEAL PLAN ----------
    function parseMealPlan(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const mealDays = {};
      let currentDay = null;
      let currentDayName = null;
      
      const dayHeaderRegex = /^(MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY)\s*—/i;
      
      for (let line of lines) {
        // Skip meta lines like "Meal Plan", "Salad Kit Rule:", etc.
        if (line.toLowerCase().startsWith('meal plan') || line.toLowerCase().startsWith('salad kit rule') ||
            line.toLowerCase().startsWith('daily option') || line.toLowerCase().startsWith('hydration')) {
          continue;
        }
        
        const dayMatch = line.match(dayHeaderRegex);
        if (dayMatch) {
          currentDayName = dayMatch[1].charAt(0).toUpperCase() + dayMatch[1].slice(1).toLowerCase();
          currentDay = [];
          mealDays[currentDayName] = { title: line, meals: currentDay };
          continue;
        }
        
        // Bullet point meals
        if (line.startsWith('·') && currentDay !== null && currentDayName) {
          const mealObj = parseMealLine(line);
          if (mealObj) currentDay.push(mealObj);
        }
      }
      return mealDays;
    }
    
    function parseMealLine(line) {
      // Example: "· Breakfast (4:30 AM): 4 egg whites + 2 whole eggs, 1 slice Ezekiel toast, 1 cup spinach, black coffee"
      const cleaned = line.replace(/^·\s*/, '');
      const match = cleaned.match(/^(.+?)\s*\(([^)]+)\)\s*:\s*(.+)/);
      if (match) {
        return {
          meal: match[1].trim(),
          time: match[2].trim(),
          description: match[3].trim()
        };
      }
      return null;
    }
    
    // ---------- WORKOUT PLAN ----------
    function parseWorkoutPlan(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const workouts = {};
      let currentDay = null;
      const dayHeaderRegex = /^(MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY)\s*—/i;
      let inTable = false;
      let tableHeaders = [];
      let tableRows = [];
      let pullUpRescueText = '';
      
      function finalizeDay() {
        if (currentDay && workouts[currentDay]) {
          if (tableRows.length > 0) {
            workouts[currentDay].exercises = tableRows.map(row => {
              const obj = {};
              for (let i = 0; i < tableHeaders.length; i++) {
                obj[tableHeaders[i]] = row[i] || '';
              }
              return obj;
            });
          }
          if (pullUpRescueText) {
            workouts[currentDay].pullUpRescue = pullUpRescueText;
          }
        }
        tableHeaders = [];
        tableRows = [];
        pullUpRescueText = '';
        inTable = false;
      }
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const dayMatch = line.match(dayHeaderRegex);
        if (dayMatch) {
          finalizeDay();
          const dayName = dayMatch[1].charAt(0).toUpperCase() + dayMatch[1].slice(1).toLowerCase();
          currentDay = dayName;
          workouts[currentDay] = { title: line, details: [], exercises: [], pullUpRescue: '' };
          continue;
        }
        
        if (!currentDay) continue;
        
        // Detect table header (contains "Exercise" or "Block" and "Reps")
        if (line.match(/block.*exercise|exercise.*reps/i) || (line.includes('Exercise') && line.includes('Reps'))) {
          // Table header
          inTable = true;
          tableHeaders = line.split(/\s{2,}/).map(h => h.trim().toLowerCase().replace(/\//g, '_').replace(/\s+/g, '_'));
          continue;
        }
        
        if (inTable) {
          // Check if still a table row: starts with a number (block) or has typical exercise words
          if (/^\d+\s+/.test(line) || line.match(/^\d+\s+/)) {
            const rowTokens = line.split(/\s{2,}/);
            tableRows.push(rowTokens);
            continue;
          } else {
            // End of table
            inTable = false;
            // Save table data to current day
            if (tableRows.length > 0) {
              workouts[currentDay].exercises = tableRows.map(row => {
                const obj = {};
                for (let i = 0; i < tableHeaders.length; i++) {
                  obj[tableHeaders[i]] = row[i] || '';
                }
                return obj;
              });
              tableRows = [];
              tableHeaders = [];
            }
          }
        }
        
        // Pull-up rescue line
        if (line.toLowerCase().includes('pull-up rescue')) {
          pullUpRescueText = line;
          // The following lines until empty might be rescue details
          let j = i+1;
          while (j < lines.length && lines[j].trim() !== '' && !lines[j].match(dayHeaderRegex)) {
            pullUpRescueText += ' ' + lines[j].trim();
            j++;
          }
          i = j-1;
          continue;
        }
        
        // Regular bullet or detail line
        if (line.startsWith('·') || line.startsWith('-') || line.startsWith('*')) {
          workouts[currentDay].details.push(line.replace(/^[·\-\*]\s*/, ''));
        } else if (line.length > 0 && !inTable && !line.match(dayHeaderRegex)) {
          // Additional details (like "Target: 6 rounds...")
          workouts[currentDay].details.push(line);
        }
      }
      finalizeDay();
      return workouts;
    }
    
    // ---------- REHAB TABLE ----------
    function parseRehabTable(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const rehab = [];
      let headerFound = false;
      for (let line of lines) {
        if (line.toLowerCase().includes('exercise') && line.toLowerCase().includes('reps')) {
          headerFound = true;
          continue;
        }
        if (!headerFound) continue;
        if (line.startsWith('·') || line.startsWith('-')) {
          const parts = line.replace(/^[·\-]\s*/, '').split(/\s{2,}/);
          if (parts.length >= 3) {
            rehab.push({
              exercise: parts[0].trim(),
              reps_time: parts[1].trim(),
              purpose: parts.slice(2).join(' ').trim()
            });
          } else if (parts.length === 2) {
            rehab.push({
              exercise: parts[0].trim(),
              reps_time: parts[1].trim(),
              purpose: ''
            });
          }
        }
      }
      return rehab;
    }
    
    // ---------- SUPPLEMENTS ----------
    function parseSupplements(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const supps = [];
      for (let line of lines) {
        if (line.toLowerCase().includes('supplement protocol') || line.toLowerCase().includes('unchanged')) continue;
        if (line.startsWith('·') || line.startsWith('-')) {
          supps.push(line.replace(/^[·\-]\s*/, ''));
        } else if (line && !line.startsWith('No BCAAs')) {
          supps.push(line);
        }
      }
      return supps;
    }
    
    // ---------- STOP RULES ----------
    function parseStopRules(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const rules = [];
      for (let line of lines) {
        if (line.match(/^\d+\./)) {
          rules.push(line.replace(/^\d+\.\s*/, ''));
        }
      }
      return rules;
    }
    
    // ---------- RENDER FUNCTIONS ----------
    function renderDailySchedule(schedule) {
      if (!schedule || Object.keys(schedule).length === 0) return '<p class="text-muted">No schedule data parsed.</p>';
      let html = '';
      const dayOrder = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      for (let day of dayOrder) {
        if (!schedule[day]) continue;
        const events = schedule[day];
        if (events.length === 0) continue;
        html += `<div class="mb-3"><h6 class="fw-bold">${day}</h6><ul class="list-group list-group-flush">`;
        for (let ev of events) {
          html += `<li class="list-group-item d-flex justify-content-between"><span class="badge-time">${ev.time}</span> <span class="ms-3 flex-grow-1">${ev.activity}</span></li>`;
        }
        html += `</ul></div>`;
      }
      return html || '<p class="text-muted">No events found.</p>';
    }
    
    function renderMealPlan(mealPlan) {
      if (!mealPlan || Object.keys(mealPlan).length === 0) return '<p class="text-muted">No meal plan parsed.</p>';
      let html = '';
      const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      for (let day of dayOrder) {
        const data = mealPlan[day];
        if (!data) continue;
        html += `<div class="meal-day"><h6 class="fw-bold">${data.title}</h6>`;
        if (data.meals && data.meals.length > 0) {
          html += `<ul class="list-group list-group-flush mt-2">`;
          for (let m of data.meals) {
            html += `<li class="list-group-item"><span class="badge bg-secondary me-2">${m.meal} (${m.time})</span> ${m.description}</li>`;
          }
          html += `</ul>`;
        }
        html += `</div>`;
      }
      return html || '<p class="text-muted">No meals found.</p>';
    }
    
    function renderWorkouts(workouts) {
      if (!workouts || Object.keys(workouts).length === 0) return '<p class="text-muted">No workout data parsed.</p>';
      let html = '';
      const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      for (let day of dayOrder) {
        const wo = workouts[day];
        if (!wo) continue;
        html += `<div class="card mb-3"><div class="card-body"><h6 class="card-title fw-bold">${wo.title}</h6>`;
        if (wo.details.length > 0) {
          html += `<ul class="list-unstyled">`;
          for (let d of wo.details) html += `<li>• ${d}</li>`;
          html += `</ul>`;
        }
        if (wo.exercises && wo.exercises.length > 0) {
          html += `<div class="table-responsive"><table class="table table-sm table-bordered"><thead><tr>`;
          for (let key of Object.keys(wo.exercises[0])) {
            html += `<th>${key.replace(/_/g, ' ')}</th>`;
          }
          html += `</tr></thead><tbody>`;
          for (let row of wo.exercises) {
            html += `<tr>`;
            for (let key of Object.keys(row)) {
              html += `<td>${row[key]}</td>`;
            }
            html += `</tr>`;
          }
          html += `</tbody></table></div>`;
        }
        if (wo.pullUpRescue) {
          html += `<p class="fw-semibold mt-2">🔹 Pull-Up Rescue:</p><p>${wo.pullUpRescue}</p>`;
        }
        html += `</div></div>`;
      }
      return html || '<p class="text-muted">No workouts.</p>';
    }
    
    function renderRehab(rehab) {
      if (!rehab || rehab.length === 0) return '<p class="text-muted">No rehab exercises parsed.</p>';
      let html = `<div class="table-responsive"><table class="table table-striped"><thead><tr><th>Exercise</th><th>Reps/Time</th><th>Purpose</th></tr></thead><tbody>`;
      for (let r of rehab) {
        html += `<tr><td>${r.exercise}</td><td>${r.reps_time}</td><td>${r.purpose}</td></tr>`;
      }
      html += `</tbody></table></div>`;
      return html;
    }
    
    function renderSupplements(supps) {
      if (!supps || supps.length === 0) return '<p class="text-muted">No supplements parsed.</p>';
      let html = `<ul class="list-group">`;
      for (let s of supps) html += `<li class="list-group-item">${s}</li>`;
      html += `</ul>`;
      return html;
    }
    
    function renderStopRules(rules) {
      if (!rules || rules.length === 0) return '<p class="text-muted">No stop rules parsed.</p>';
      let html = '';
      for (let r of rules) {
        html += `<div class="stop-rule">${r}</div>`;
      }
      return html;
    }
    
    // ---------- MAIN APP ----------
    const textarea = document.getElementById('rawInput');
    const parseBtn = document.getElementById('parseBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportJsonBtn');
    const errorDiv = document.getElementById('parseError');
    const resultsContainer = document.getElementById('resultsContainer');
    
    // Tab panes
    const schedulePane = document.getElementById('schedulePane');
    const mealsPane = document.getElementById('mealsPane');
    const workoutPane = document.getElementById('workoutPane');
    const rehabSuppsPane = document.getElementById('rehabSuppsPane');
    const stopPane = document.getElementById('stopPane');
    const jsonPane = document.getElementById('jsonPane');
    
    let lastParsedData = null;
    
    function clearResults() {
      schedulePane.innerHTML = '';
      mealsPane.innerHTML = '';
      workoutPane.innerHTML = '';
      rehabSuppsPane.innerHTML = '';
      stopPane.innerHTML = '';
      jsonPane.innerHTML = '';
      resultsContainer.style.display = 'none';
      exportBtn.disabled = true;
      lastParsedData = null;
      errorDiv.textContent = '';
    }
    
    parseBtn.addEventListener('click', () => {
      const raw = textarea.value.trim();
      if (!raw) {
        errorDiv.textContent = 'Please paste the plan text first.';
        return;
      }
      errorDiv.textContent = '';
      try {
        const data = parseFullPlan(raw);
        lastParsedData = data;
        
        // Render sections
        schedulePane.innerHTML = renderDailySchedule(data.dailySchedule);
        mealsPane.innerHTML = renderMealPlan(data.mealPlan);
        workoutPane.innerHTML = renderWorkouts(data.workouts);
        
        // Rehab & Supps combined
        let rehabSuppsHtml = '<h5 class="section-title">🧘 Daily Rehab</h5>';
        rehabSuppsHtml += renderRehab(data.rehab);
        rehabSuppsHtml += '<h5 class="section-title mt-4">💊 Supplement Protocol</h5>';
        rehabSuppsHtml += renderSupplements(data.supplements);
        rehabSuppsPane.innerHTML = rehabSuppsHtml;
        
        stopPane.innerHTML = '<h5 class="section-title">⚠️ Stop Rules</h5>' + renderStopRules(data.stopRules);
        
        // JSON raw
        jsonPane.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        
        resultsContainer.style.display = 'block';
        exportBtn.disabled = false;
        
        // Activate first tab
        const firstTab = document.querySelector('#resultTabs button.active');
        if (!firstTab) {
          document.getElementById('schedule-tab').click();
        }
      } catch (e) {
        errorDiv.textContent = 'Parsing error: ' + e.message;
        console.error(e);
      }
    });
    
    clearBtn.addEventListener('click', () => {
      textarea.value = '';
      clearResults();
    });
    
    exportBtn.addEventListener('click', () => {
      if (!lastParsedData) return;
      const dataStr = JSON.stringify(lastParsedData, null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'fitness_plan_parsed.json';
      a.click();
      URL.revokeObjectURL(url);
    });
    
    // Optional: load example text for demo (if empty)
    // Not pre-loading to avoid clutter, but you can paste the provided text.
  })();
</script>
</body>
