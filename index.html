<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fitness Tracker v2.4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --bg: #e0e0e0; --card-bg: #f5f5f5; --primary: #1a1a1a; --success: #2e7d32; --warning: #f57c00; --text: #000; --border: #bdbdbd; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); padding-bottom: 3rem; }
    .container { max-width: 1300px; margin-top: 1.5rem; position: relative; }
    .version-badge { position: absolute; top: 0; right: 0; background: #333; color: white; padding: 0.3rem 0.8rem; border-radius: 0 0 0 12px; font-size: 0.8rem; opacity: 0.9; }
    .card { background: var(--card-bg); border: 1px solid var(--border); box-shadow: 0 0.15rem 0.5rem rgba(0,0,0,0.1); border-radius: 12px; }
    .badge-time { background: var(--primary); color: white; }
    .meal-day { background: #e8e8e8; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    .nav-tabs .nav-link { font-weight: 500; border: none; color: #333; }
    .nav-tabs .nav-link.active { color: #000; border-bottom: 3px solid #000; background: transparent; font-weight: 700; }
    .planned-meal { background: #d9d9d9; border-left: 4px solid var(--primary); padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; }
    .actual-meal-entry { background: #e0e0e0; border-left: 4px solid var(--success); margin-top: 0.5rem; }
    .workout-note-row { background: #e8e8e8; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.75rem; border: 1px solid var(--border); }
    .metric-card { background: #757575; color: #fff; border-radius: 14px; padding: 1.5rem; text-align: center; box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
    .metric-card.secondary { background: #616161; }
    .metric-card.tertiary { background: #424242; }
    .dashboard-highlight { background: #d5d5d5; border-radius: 14px; padding: 1.2rem 1.5rem; margin: 1rem 0; border: 1px solid #9e9e9e; }
    .btn-primary { background: #333; border-color: #222; color: #fff; }
    .btn-success { background: #2e7d32; border-color: #1b5e20; color: #fff; }
  </style>
</head>
<body>
<div class="container">
  <div class="version-badge">v2.4</div>
  <h1 class="mb-2 text-center fw-bold">📋 Weekly Fitness & Nutrition Tracker</h1>
  <p class="text-center mb-4" style="color:#333;">Parse plan → Log actual meals & lifts → Track body metrics</p>
  
  <ul class="nav nav-tabs justify-content-center mb-4" id="mainTabs">
    <li class="nav-item"><button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboardPane">🏠 Dashboard</button></li>
    <li class="nav-item"><button class="nav-link" id="parse-tab" data-bs-toggle="tab" data-bs-target="#parsePane">📥 Parse Plan</button></li>
    <li class="nav-item"><button class="nav-link" id="meals-log-tab" data-bs-toggle="tab" data-bs-target="#mealsLogPane">🍽️ Meal Log</button></li>
    <li class="nav-item"><button class="nav-link" id="workout-log-tab" data-bs-toggle="tab" data-bs-target="#workoutLogPane">🏋️ Workout Log</button></li>
    <li class="nav-item"><button class="nav-link" id="body-tab" data-bs-toggle="tab" data-bs-target="#bodyPane">📊 Body Metrics</button></li>
  </ul>
  
  <div class="tab-content">
    <div class="tab-pane fade show active" id="dashboardPane"><div id="dashboardContent"><div class="text-center py-5 text-muted">Parse your plan to start.</div></div></div>
    <div class="tab-pane fade" id="parsePane">
      <div class="row justify-content-center"><div class="col-lg-10">
        <div class="card"><div class="card-body">
          <label class="form-label fw-bold">Paste plan text</label>
          <textarea id="rawInput" class="form-control mb-3" rows="10" placeholder="Paste full plan..."></textarea>
          <div class="d-flex gap-2"><button id="parseBtn" class="btn btn-primary px-4">🔍 Parse</button><button id="clearBtn" class="btn btn-outline-secondary">Clear</button><button id="exportJsonBtn" class="btn btn-outline-dark ms-auto" disabled>📥 JSON</button></div>
          <div id="parseError" class="text-danger small mt-2"></div>
        </div></div>
        <div id="resultsContainer" style="display:none;">
          <ul class="nav nav-tabs mt-3"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#schedulePane">📅</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#mealsPane">🍽️</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#workoutPane">🏋️</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#rehabSuppsPane">🧘</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#stopPane">⚠️</button></li></ul>
          <div class="tab-content mt-2"><div class="tab-pane fade show active" id="schedulePane"></div><div class="tab-pane fade" id="mealsPane"></div><div class="tab-pane fade" id="workoutPane"></div><div class="tab-pane fade" id="rehabSuppsPane"></div><div class="tab-pane fade" id="stopPane"></div></div>
        </div>
      </div></div>
    </div>
    <div class="tab-pane fade" id="mealsLogPane"><div id="mealLogContent"><div class="text-center py-5 text-muted">Parse a plan first.</div></div></div>
    <div class="tab-pane fade" id="workoutLogPane"><div id="workoutLogContent"><div class="text-center py-5 text-muted">Parse a plan first.</div></div></div>
    <div class="tab-pane fade" id="bodyPane">
      <div class="row"><div class="col-lg-6 mx-auto"><div class="card"><div class="card-body">
        <h5 class="fw-bold"><i class="bi bi-graph-up"></i> Log Body Metrics</h5>
        <div class="row g-3 mt-2">
          <div class="col-md-6"><label class="form-label">Date</label><input type="date" id="bodyDate" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Weight (lbs)</label><input type="number" id="bodyWeight" class="form-control" step="0.1"></div>
          <div class="col-md-4"><label class="form-label">Body Fat (lbs)</label><input type="number" id="bodyFat" class="form-control" step="0.1"></div>
          <div class="col-md-4"><label class="form-label">Visceral Fat</label><input type="number" id="visceralFat" class="form-control" step="0.1"></div>
          <div class="col-md-4"><label class="form-label">Skeletal Muscle (lbs)</label><input type="number" id="skeletalMuscle" class="form-control" step="0.1"></div>
        </div>
        <button id="saveBodyMetrics" class="btn btn-primary mt-3 w-100"><i class="bi bi-save"></i> Save Entry</button>
        <div id="bodyMetricsHistory" class="mt-4"></div>
      </div></div></div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    const STORAGE = { PARSED_PLAN: 'fitness_parsed_plan', MEAL_LOGS: 'fitness_meal_logs', WORKOUT_LOGS: 'fitness_workout_logs', BODY_METRICS: 'fitness_body_metrics' };
    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const DAY_ABBR = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const DAY_REGEX = /^(MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY)\s*—/i;

    // ---------- PARSER (updated for notes-style) ----------
    function parseWorkoutPlan(text){
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const workouts = {};
      let currentDay = null;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const dayMatch = line.match(DAY_REGEX);
        if (dayMatch) {
          currentDay = dayMatch[1].charAt(0).toUpperCase() + dayMatch[1].slice(1).toLowerCase();
          workouts[currentDay] = { title: line, details: [], exercises: [] };
          continue;
        }
        if (!currentDay) continue;
        // Capture numbered exercise lines (e.g., "1 Chest-Supported DB Row...")
        if (/^\d+\s+/.test(line) && !/^(Post:|Pull-Up|Finisher)/i.test(line)) {
          workouts[currentDay].details.push(line);
          continue;
        }
        // Capture other important lines (like "Pull-Up Rescue: ...", "Post: ...")
        if (line.startsWith('·') || line.startsWith('-') || line.startsWith('*')) {
          workouts[currentDay].details.push(line.replace(/^[·\-*]\s*/, ''));
        } else if (line.length > 0 && !line.match(/block|exercise/i) ) {
          workouts[currentDay].details.push(line);
        }
      }
      return workouts;
    }

    // Other parsers (unchanged)
    function parseFullPlan(text) {
      text = text.replace(/^[“"']+/, '').replace(/[”"']+$/, '').trim();
      const sectionsRaw = text.split(/\n---+\n/).map(s => s.trim()).filter(s => s);
      let pd = {}, ds = null, mp = null, wp = null, dr = null, sp = null, sr = null;
      for (let sec of sectionsRaw) {
        const lines = sec.split('\n').filter(l => l.trim());
        if (!lines.length) continue;
        const first = lines[0].toLowerCase();
        if (first.includes('primary directive')) pd = parsePrimaryDirective(sec);
        else if (first.includes('daily schedule snapshot')) ds = sec;
        else if (first.includes('meal plan')) mp = sec;
        else if (first.includes('workout plan') || first.includes('progression targets')) wp = sec;
        else if (first.includes('daily rehab')) dr = sec;
        else if (first.includes('supplement protocol')) sp = sec;
        else if (first.includes('stop rules')) sr = sec;
      }
      if (!Object.keys(pd).length) pd = parsePrimaryDirective(sectionsRaw[0]||'');
      return {
        primaryDirective: pd,
        dailySchedule: ds ? parseDailySchedule(ds) : [],
        mealPlan: mp ? parseMealPlan(mp) : {},
        workouts: wp ? parseWorkoutPlan(wp) : {},
        rehab: dr ? parseRehabTable(dr) : [],
        supplements: sp ? parseSupplements(sp) : [],
        stopRules: sr ? parseStopRules(sr) : []
      };
    }
    function parsePrimaryDirective(text) { const r={}; text.split('\n').forEach(l=>{ if(l.includes('Primary Directive')) r.directive=l.split(':').slice(1).join(':').trim(); else if(l.includes('No BCAAs')||l.includes('No alcohol')) r.restrictions=l; else if(l.includes('Black coffee')) r.allowedDrinks=l; else if(l.match(/^\d+,\s*\d{4}/)) r.date=l; }); return r; }
    function parseDailySchedule(text) { const lines=text.split('\n').filter(l=>l.trim()); let hi=lines.findIndex(l=>l.includes('Time')&&(l.includes('Mon')||l.includes('Tue'))); if(hi===-1) return[]; const days=lines[hi].split(/\s{2,}/).filter(t=>DAY_ABBR.includes(t.slice(0,3))).map(t=>t.slice(0,3)); let sched={}; days.forEach(d=>sched[d]=[]); for(let i=hi+1;i<lines.length;i++){ if(!/^\d{1,2}:\d{2}\s+(AM|PM)/i.test(lines[i])) break; const tk=lines[i].split(/\s{2,}/); const time=tk[0]; const acts=tk.slice(1,1+days.length).map(t=>t==='—'?'':t); days.forEach((d,idx)=>{ if(acts[idx]) sched[d].push({time,activity:acts[idx]}); }); } return sched; }
    function parseMealPlan(text) { const lines=text.split('\n').filter(l=>l.trim()); const md={}; let cur=null,nm=null; lines.forEach(l=>{ if(l.match(/^(meal plan|salad kit rule|daily option|hydration)/i)) return; const dm=l.match(DAY_REGEX); if(dm){ nm=dm[1].charAt(0).toUpperCase()+dm[1].slice(1).toLowerCase(); cur=[]; md[nm]={title:l,meals:cur}; } else if(l.startsWith('·')&&cur){ const m=parseMealLine(l); if(m) cur.push(m); } }); return md; }
    function parseMealLine(line){ const c=line.replace(/^·\s*/,''); const m=c.match(/^(.+?)\s*\(([^)]+)\)\s*:\s*(.+)/); return m?{meal:m[1].trim(),time:m[2].trim(),description:m[3].trim()}:null; }
    function parseRehabTable(text){ const lines=text.split('\n').filter(l=>l.trim()); const re=[]; let hf=false; lines.forEach(l=>{ if(l.toLowerCase().includes('exercise')&&l.toLowerCase().includes('reps')){ hf=true; return; } if(!hf||!(l.startsWith('·')||l.startsWith('-'))) return; const p=l.replace(/^[·\-]\s*/,'').split(/\s{2,}/); if(p.length>=2) re.push({exercise:p[0],reps_time:p[1],purpose:p.slice(2).join(' ')}); }); return re; }
    function parseSupplements(text){ return text.split('\n').filter(l=>l.trim()&&!l.toLowerCase().includes('supplement protocol')&&!l.includes('No BCAAs')); }
    function parseStopRules(text){ return text.split('\n').filter(l=>/^\d+\./.test(l)).map(l=>l.replace(/^\d+\.\s*/,'')); }

    // Storage
    const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
    const load=k=>JSON.parse(localStorage.getItem(k)||'null');
    const getPlan=()=>load(STORAGE.PARSED_PLAN);
    const savePlan=p=>save(STORAGE.PARSED_PLAN,p);
    const getMealLogs=()=>load(STORAGE.MEAL_LOGS)||{};
    const saveMealLogs=l=>save(STORAGE.MEAL_LOGS,l);
    const getWorkoutLogs=()=>load(STORAGE.WORKOUT_LOGS)||{};
    const saveWorkoutLogs=l=>save(STORAGE.WORKOUT_LOGS,l);
    const getBodyMetrics=()=>load(STORAGE.BODY_METRICS)||[];
    const saveBodyMetrics=m=>save(STORAGE.BODY_METRICS,m);

    // Render helpers
    function renderSchedule(s){ if(!s||!Object.keys(s).length) return'<p class="text-muted">No schedule.</p>'; return DAY_ABBR.filter(d=>s[d]).map(d=>'<div class="mb-3"><h6 class="fw-bold">'+d+'</h6><ul class="list-group list-group-flush">'+s[d].map(e=>'<li class="list-group-item d-flex"><span class="badge-time me-2">'+e.time+'</span> '+e.activity+'</li>').join('')+'</ul></div>').join(''); }
    function renderMealPlan(mp){ if(!mp||!Object.keys(mp).length) return'<p class="text-muted">No meal plan.</p>'; return DAYS.filter(d=>mp[d]).map(d=>'<div class="meal-day"><h6 class="fw-bold">'+mp[d].title+'</h6><ul class="list-group list-group-flush">'+mp[d].meals.map(m=>'<li class="list-group-item"><span class="badge bg-secondary me-2">'+m.meal+' ('+m.time+')</span> '+m.description+'</li>').join('')+'</ul></div>').join(''); }
    function renderWorkouts(w){ if(!w||!Object.keys(w).length) return'<p class="text-muted">No workouts.</p>'; return DAYS.filter(d=>w[d]).map(d=>{const wo=w[d]; let h='<div class="card mb-3"><div class="card-body"><h6 class="fw-bold">'+wo.title+'</h6>'; if(wo.details.length) h+=wo.details.map(d=>'<p class="mb-1">• '+d+'</p>').join(''); return h+'</div></div>'; }).join(''); }

    // Meal Log (unchanged)
    function renderMealLogUI(selectedDay = null) {
      const plan = getPlan(); if (!plan || !plan.mealPlan || !Object.keys(plan.mealPlan).length) { document.getElementById('mealLogContent').innerHTML='<div class="text-center py-5 text-muted">Parse a plan first.</div>'; return; }
      const mealLogs = getMealLogs(); const today = new Date().toISOString().split('T')[0];
      const availableDays = DAYS.filter(d => plan.mealPlan[d]);
      const currentDay = selectedDay && availableDays.includes(selectedDay) ? selectedDay : availableDays[0];
      let html = `<div class="card"><div class="card-body"><h5 class="fw-bold mb-3"><i class="bi bi-pencil-square"></i> Daily Meal Log</h5><div class="row mb-3"><div class="col-md-4"><label class="form-label">Log Date</label><input type="date" id="mealLogDate" class="form-control" value="${today}"></div><div class="col-md-4"><label class="form-label">Select Day</label><select id="mealDaySelect" class="form-select">${availableDays.map(d => `<option value="${d}" ${d===currentDay?'selected':''}>${d}</option>`).join('')}</select></div></div><div id="mealDayPlan">`;
      const dayPlan = plan.mealPlan[currentDay];
      if (dayPlan) { dayPlan.meals.forEach((meal, idx) => { const mealKey = `${currentDay}_${idx}`; const log = mealLogs[mealKey] || {}; html += `<div class="meal-log-row border rounded p-3 mb-3"><div class="planned-meal"><strong>${meal.meal} (${meal.time})</strong><br>Planned: ${meal.description}</div><div class="mt-2 actual-meal-entry p-2 rounded"><label class="form-label small mb-1 fw-semibold">What I actually ate:</label><textarea class="form-control actual-meal-text" data-meal-key="${mealKey}" rows="2">${log.description||''}</textarea><div class="form-check mt-2"><input class="form-check-input adherence-check" type="checkbox" data-meal-key="${mealKey}" ${log.adherent?'checked':''}><label class="form-check-label">Adherent to plan</label></div></div></div>`; }); }
      html += `</div><button id="saveMealLogBtn" class="btn btn-success w-100 mt-3"><i class="bi bi-check2-circle"></i> Save ${currentDay} Meal Log</button></div></div>`;
      document.getElementById('mealLogContent').innerHTML = html;
      document.getElementById('mealDaySelect').addEventListener('change', function() { renderMealLogUI(this.value); });
      document.getElementById('saveMealLogBtn').addEventListener('click', () => { const date = document.getElementById('mealLogDate').value; const logs = getMealLogs(); document.querySelectorAll('.actual-meal-text').forEach(ta => { const key = ta.dataset.mealKey; const cb = document.querySelector(`.adherence-check[data-meal-key="${key}"]`); logs[key] = { date, description: ta.value, adherent: cb ? cb.checked : false }; }); saveMealLogs(logs); alert('Meal log saved!'); renderDashboard(); });
    }

    // ---------- WORKOUT LOG (notes style) ----------
    function renderWorkoutLogUI(selectedDay = null) {
      const plan = getPlan();
      if (!plan || !plan.workouts || !Object.keys(plan.workouts).length) { document.getElementById('workoutLogContent').innerHTML='<div class="text-center py-5 text-muted"><i class="bi bi-activity"></i><p>Parse a plan first.</p></div>'; return; }
      const workoutLogs = getWorkoutLogs(); const today = new Date().toISOString().split('T')[0];
      const availableDays = DAYS.filter(d => plan.workouts[d] && (plan.workouts[d].details?.length || plan.workouts[d].exercises?.length));
      if (!availableDays.length) { document.getElementById('workoutLogContent').innerHTML='<div class="text-center py-5 text-muted"><p>No exercise data found in the plan.</p></div>'; return; }
      const currentDay = selectedDay && availableDays.includes(selectedDay) ? selectedDay : availableDays[0];
      const wo = plan.workouts[currentDay]; const isJudo = wo && wo.title.toLowerCase().includes('judo');
      let html = `<div class="card"><div class="card-body"><h5 class="fw-bold"><i class="bi bi-bar-chart"></i> Workout Log</h5><div class="row mb-3"><div class="col-md-4"><label class="form-label">Log Date</label><input type="date" id="workoutLogDate" class="form-control" value="${today}"></div><div class="col-md-4"><label class="form-label">Select Day</label><select id="workoutDaySelect" class="form-select">${availableDays.map(d => `<option value="${d}" ${d===currentDay?'selected':''}>${d}</option>`).join('')}</select></div></div><div id="workoutDayPlan">`;
      if (wo) {
        if (isJudo) {
          if (wo.details?.length) { html += `<div class="mb-3"><h6>Workout Details</h6><ul class="list-group list-group-flush">`+ wo.details.map(d=>`<li class="list-group-item">${d}</li>`).join('') +`</ul></div>`; }
          const judoKey=`${currentDay}_judo_feel`; const savedFeel=workoutLogs[judoKey]?.feel||5;
          html += `<div class="judo-slider-container" style="background:#e8e8e8;border-radius:8px;padding:1rem;margin:1rem 0;"><label>How did Judo feel? (1=terrible, 10=amazing)</label><input type="range" class="form-range" id="judoFeelSlider" min="1" max="10" value="${savedFeel}" step="1"><div class="d-flex justify-content-between"><span>1</span><span class="fw-bold" id="judoFeelValue">${savedFeel}</span><span>10</span></div></div>`;
        } else if (wo.details?.length) {
          // Notes-style logging: each planned exercise gets a textarea for actual notes
          html += `<div class="mb-3"><h6>Planned Exercises</h6>`;
          wo.details.forEach((detail, idx) => {
            const noteKey = `${currentDay}_note_${idx}`;
            const savedNote = workoutLogs[noteKey]?.note || '';
            html += `
              <div class="workout-note-row">
                <div class="planned-meal"><strong>${detail}</strong></div>
                <div class="mt-2 actual-meal-entry p-2 rounded">
                  <label class="form-label small mb-1 fw-semibold">Actual performance (weight, reps, sets, notes)</label>
                  <textarea class="form-control workout-note-text" data-note-key="${noteKey}" rows="2">${savedNote}</textarea>
                </div>
              </div>`;
          });
          html += `</div>`;
        } else {
          html += '<p class="text-muted">No exercises or details for this day.</p>';
        }
      }
      html += `</div><button id="saveWorkoutLogBtn" class="btn btn-success w-100 mt-3"><i class="bi bi-check2-circle"></i> Save ${currentDay} Workout Log</button></div></div>`;
      document.getElementById('workoutLogContent').innerHTML = html;
      if (isJudo) { const slider=document.getElementById('judoFeelSlider'); document.getElementById('judoFeelValue').textContent=slider.value; slider.addEventListener('input',()=>document.getElementById('judoFeelValue').textContent=slider.value); }
      document.getElementById('workoutDaySelect').addEventListener('change', function() { renderWorkoutLogUI(this.value); });
      document.getElementById('saveWorkoutLogBtn').addEventListener('click', () => {
        const date=document.getElementById('workoutLogDate').value;
        const logs=getWorkoutLogs();
        if (isJudo) {
          const slider=document.getElementById('judoFeelSlider');
          logs[`${currentDay}_judo_feel`] = { date, feel: parseInt(slider.value) };
        } else {
          document.querySelectorAll('.workout-note-text').forEach(ta => {
            const key = ta.dataset.noteKey;
            logs[key] = { date, note: ta.value };
          });
        }
        saveWorkoutLogs(logs);
        alert('Workout log saved!');
        renderDashboard();
      });
    }

    // Body metrics & dashboard
    function renderBodyHistory() { const m=getBodyMetrics(); if(!m.length){ document.getElementById('bodyMetricsHistory').innerHTML='<p class="text-muted mt-3">No entries.</p>'; return; } const sorted=[...m].sort((a,b)=>new Date(b.date)-new Date(a.date)); let h='<h6 class="fw-bold mt-4">History</h6><div class="table-responsive"><table class="table table-sm"><thead><tr><th>Date</th><th>Weight</th><th>BF(lbs)</th><th>Visceral</th><th>Muscle(lbs)</th></tr></thead><tbody>'; sorted.slice(0,10).forEach(m=>h+=`<tr><td>${m.date}</td><td>${m.weight||'-'}</td><td>${m.bodyFat||'-'}</td><td>${m.visceralFat||'-'}</td><td>${m.skeletalMuscle||'-'}</td></tr>`); h+='</tbody></table></div>'; document.getElementById('bodyMetricsHistory').innerHTML=h; }
    function renderDashboard() { const plan=getPlan(), body=getBodyMetrics(), meals=getMealLogs(), wLogs=getWorkoutLogs(); if(!plan){ document.getElementById('dashboardContent').innerHTML='<div class="text-center py-5 text-muted">Parse your plan to start.</div>'; return; } const latest=body.length?body.sort((a,b)=>new Date(b.date)-new Date(a.date))[0]:null; const totalMeals=Object.values(meals).filter(l=>l.description).length, adherent=Object.values(meals).filter(l=>l.adherent).length, totalWOs=Object.values(wLogs).filter(l=>l.note||l.feel).length; let html=`<div class="row g-4"><div class="col-12"><h4 class="fw-bold">Dashboard</h4></div><div class="col-md-6 col-lg-3"><div class="metric-card"><div class="metric-value">${latest?.weight||'—'}</div><div class="metric-label">Weight (lbs)</div></div></div><div class="col-md-6 col-lg-3"><div class="metric-card secondary"><div class="metric-value">${latest?.bodyFat||'—'}</div><div class="metric-label">Body Fat (lbs)</div></div></div><div class="col-md-6 col-lg-3"><div class="metric-card tertiary"><div class="metric-value">${latest?.visceralFat||'—'}</div><div class="metric-label">Visceral Fat</div></div></div><div class="col-md-6 col-lg-3"><div class="metric-card"><div class="metric-value">${latest?.skeletalMuscle||'—'}</div><div class="metric-label">Skeletal Muscle (lbs)</div></div></div></div><div class="dashboard-highlight mt-4"><div class="row text-center"><div class="col-4"><span class="fw-bold fs-5">${totalMeals}</span><br><small>Meals Logged</small></div><div class="col-4"><span class="fw-bold fs-5">${adherent}</span><br><small>Adherent</small></div><div class="col-4"><span class="fw-bold fs-5">${totalWOs}</span><br><small>Workouts Logged</small></div></div></div>`; if(latest) html+=`<div class="mt-3 text-muted small">📅 Latest: ${latest.date}</div>`; if(plan.primaryDirective?.directive) html+=`<div class="mt-3 alert alert-info py-2"><strong>Directive:</strong> ${plan.primaryDirective.directive}</div>`; document.getElementById('dashboardContent').innerHTML=html; }

    function init() {
      renderDashboard(); renderBodyHistory();
      let plan = getPlan();
      if (plan) {
        document.getElementById('schedulePane').innerHTML = renderSchedule(plan.dailySchedule);
        document.getElementById('mealsPane').innerHTML = renderMealPlan(plan.mealPlan);
        document.getElementById('workoutPane').innerHTML = renderWorkouts(plan.workouts);
        document.getElementById('rehabSuppsPane').innerHTML = '<h5 class="section-title">🧘 Rehab</h5>'+plan.rehab.map(r=>`<p><strong>${r.exercise}</strong> – ${r.reps_time} – ${r.purpose}</p>`).join('')+'<h5 class="section-title mt-3">💊 Supplements</h5><ul>'+plan.supplements.map(s=>`<li>${s}</li>`).join('')+'</ul>';
        document.getElementById('stopPane').innerHTML = plan.stopRules.map(r=>`<div class="stop-rule">${r}</div>`).join('');
        document.getElementById('resultsContainer').style.display='block';
        const hasDetails = Object.values(plan.workouts).some(w => w.details && w.details.length > 0);
        if (!hasDetails) {
          document.getElementById('workoutLogContent').innerHTML = '<div class="alert alert-warning">⚠️ Old plan detected – no exercise details. Please go to <b>Parse tab</b>, click <b>Clear</b>, then paste and parse again.</div>';
        }
      }
    }

    document.getElementById('parseBtn').addEventListener('click',()=>{
      const raw = document.getElementById('rawInput').value.trim();
      if(!raw){ document.getElementById('parseError').textContent='Paste text first.'; return; }
      try{
        const plan = parseFullPlan(raw); savePlan(plan);
        document.getElementById('schedulePane').innerHTML=renderSchedule(plan.dailySchedule);
        document.getElementById('mealsPane').innerHTML=renderMealPlan(plan.mealPlan);
        document.getElementById('workoutPane').innerHTML=renderWorkouts(plan.workouts);
        document.getElementById('rehabSuppsPane').innerHTML='<h5 class="section-title">🧘 Rehab</h5>'+plan.rehab.map(r=>`<p><strong>${r.exercise}</strong> – ${r.reps_time} – ${r.purpose}</p>`).join('')+'<h5 class="section-title mt-3">💊 Supplements</h5><ul>'+plan.supplements.map(s=>`<li>${s}</li>`).join('')+'</ul>';
        document.getElementById('stopPane').innerHTML=plan.stopRules.map(r=>`<div class="stop-rule">${r}</div>`).join('');
        document.getElementById('resultsContainer').style.display='block'; document.getElementById('exportJsonBtn').disabled=false;
        document.getElementById('parseError').textContent='';
        renderDashboard(); renderMealLogUI(); renderWorkoutLogUI();
      }catch(e){ document.getElementById('parseError').textContent='Error: '+e.message; }
    });

    document.getElementById('clearBtn').addEventListener('click',()=>{
      document.getElementById('rawInput').value='';
      document.getElementById('resultsContainer').style.display='none';
      document.getElementById('exportJsonBtn').disabled=true;
      localStorage.removeItem(STORAGE.PARSED_PLAN);
      document.getElementById('dashboardContent').innerHTML='<div class="text-center py-5 text-muted">Parse your plan to start.</div>';
    });
    document.getElementById('exportJsonBtn').addEventListener('click',()=>{ const plan=getPlan(); if(!plan) return; const blob=new Blob([JSON.stringify(plan,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='fitness_plan.json'; a.click(); });
    document.getElementById('saveBodyMetrics').addEventListener('click',()=>{ const date=document.getElementById('bodyDate').value; if(!date){ alert('Select date'); return; } const metrics=getBodyMetrics(); metrics.push({date,weight:document.getElementById('bodyWeight').value?parseFloat(document.getElementById('bodyWeight').value):null,bodyFat:document.getElementById('bodyFat').value?parseFloat(document.getElementById('bodyFat').value):null,visceralFat:document.getElementById('visceralFat').value?parseFloat(document.getElementById('visceralFat').value):null,skeletalMuscle:document.getElementById('skeletalMuscle').value?parseFloat(document.getElementById('skeletalMuscle').value):null}); saveBodyMetrics(metrics); ['bodyDate','bodyWeight','bodyFat','visceralFat','skeletalMuscle'].forEach(id=>document.getElementById(id).value=''); renderBodyHistory(); renderDashboard(); });
    document.getElementById('meals-log-tab').addEventListener('click',()=>renderMealLogUI());
    document.getElementById('workout-log-tab').addEventListener('click',()=>renderWorkoutLogUI());
    document.getElementById('dashboard-tab').addEventListener('click',renderDashboard);

    init();
    if(getPlan()){ renderMealLogUI(); renderWorkoutLogUI(); }
  })();
</script>
</body>
</html>
